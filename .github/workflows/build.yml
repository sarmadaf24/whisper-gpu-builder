name: Download MASAQ - Auto Link Extractor

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Extract download link from Mendeley page
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import re
          
          url = "https://data.mendeley.com/datasets/9yvrzxktmr/4"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
          
          print("⏳ در حال استخراج لینک دانلود از صفحه Mendeley...")
          response = requests.get(url, headers=headers)
          soup = BeautifulSoup(response.text, 'html.parser')
          
          # جستجوی لینک دانلود
          download_link = None
          for link in soup.find_all('a', href=True):
              if 'download' in link.text.lower() or 'Download All' in link.text:
                  if 's3.amazonaws.com' in link['href'] or 'prod-datasets-files' in link['href']:
                      download_link = link['href']
                      break
          
          # روش جایگزین: جستجو در کل صفحه با regex
          if not download_link:
              pattern = r'https://prod-datasets-files\.s3\.amazonaws\.com/[^\s"\'<>]+\.zip[^\s"\'<>]*'
              matches = re.findall(pattern, response.text)
              if matches:
                  download_link = matches[0]
          
          if download_link:
              print(f"✅ لینک استخراج شد: {download_link[:100]}...")
              with open('download_link.txt', 'w') as f:
                  f.write(download_link)
          else:
              print("❌ لینک پیدا نشد. ممکن است ساختار صفحه تغییر کرده باشد.")
              exit(1)
          EOF

      - name: Download MASAQ using extracted link
        run: |
          DOWNLOAD_URL=$(cat download_link.txt)
          echo "در حال دانلود از: $DOWNLOAD_URL"
          wget --header="Accept: application/zip" \
               --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -O MASAQ.zip \
               "$DOWNLOAD_URL"

      - name: Verify and extract
        run: |
          if file MASAQ.zip | grep -q 'Zip archive'; then
            echo "✅ فایل ZIP معتبر است، در حال اکسترکت..."
            unzip MASAQ.zip -d masaq-data/
            ls -la masaq-data/
          else
            echo "❌ خطا: فایل دانلود شده ZIP نیست."
            file MASAQ.zip
            exit 1
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MASAQ-Dataset
          path: masaq-data/
