name: Download QURAN-NLP Dataset

on:
  workflow_dispatch:  # یعنی با یک کلیک دستی در GitHub اجرا می‌شود

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Download QURAN-NLP from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: kaggle datasets download -d zamanayaz2020/quran-nlp

      - name: Unzip and organize files
        run: |
          unzip quran-nlp.zip -d quran-nlp-data/
          rm quran-nlp.zip
          ls -la quran-nlp-data/

      - name: Upload as artifact (for download)
        uses: actions/upload-artifact@v4
        with:
          name: QURAN-NLP-CSV
          path: quran-nlp-data/
