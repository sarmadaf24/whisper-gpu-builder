name: Download MASAQ - Simple Direct Download

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MASAQ with valid link
        run: |
          # ⚠️ لینک زیر را با لینکی که از مرورگر کپی کردید جایگزین کنید
          VALID_URL="https://prod-datasets-files.s3.amazonaws.com/9yvrzxktmr/4/[لینک جدید شما]"
          
          echo "⏳ دانلود از لینک جدید..."
          wget -O MASAQ.zip "$VALID_URL"
          
          echo "✅ دانلود کامل شد. بررسی فایل..."
          unzip -l MASAQ.zip | head -20
          unzip MASAQ.zip -d masaq-data/

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MASAQ-Dataset
          path: masaq-data/
