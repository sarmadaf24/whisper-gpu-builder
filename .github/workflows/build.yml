name: Download MASAQ by ID

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install datahugger
        run: |
          pip install datahugger

      - name: Download dataset using DOI
        run: |
          python -c "
          from datahugger import download
          # آموزش: شناسه DOI دیتاست مورد نظرتان را اینجا قرار دهید
          # می‌توانید آن را از صفحه دیتاست در Mendeley کپی کنید
          # مثال: '10.17632/9yvrzxktmr.4'
          doi = '10.17632/9yvrzxktmr.4'  # <-- شناسه دیتاست MASAQ
          download(doi, 'downloaded_dataset')
          "

      - name: Upload dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MASAQ-Dataset
          path: downloaded_dataset/
