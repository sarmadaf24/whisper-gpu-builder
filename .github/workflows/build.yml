name: Download MASAQ - Datahugger

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install datahugger
        run: |
          pip install datahugger

      - name: Download dataset using DOI
        run: |
          python -c "
          import datahugger
          # شناسه DOI دیتاست MASAQ
          doi = '10.17632/9yvrzxktmr.4'
          # دانلود به پوشه 'masaq-data'
          datahugger.get(doi, 'masaq-data')
          print('✅ دانلود کامل شد!')
          "

      - name: List downloaded files
        run: |
          echo "📁 محتویات پوشه دانلود شده:"
          ls -la masaq-data/

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MASAQ-Dataset
          path: masaq-data/
