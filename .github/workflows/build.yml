name: دانلود کامل QURAN-NLP (کل مخزن)

on:
  workflow_dispatch:  # با کلیک دستی اجرا می‌شود

jobs:
  download-full-repo:
    runs-on: ubuntu-latest
    steps:
      - name: مخزن مقصد را آماده کن (برای ذخیره فایل‌ها)
        uses: actions/checkout@v4

      - name: کل مخزن QURAN-NLP را clone کن (حدود 1.7 گیگابایت)
        run: |
          echo "در حال clone کردن مخزن اصلی (حدود 1.7 گیگ)..."
          git clone --depth 1 https://github.com/islamAndAi/QURAN-NLP.git
          echo "clone کامل شد!"

      - name: حجم فایل‌های دانلود شده را نمایش بده
        run: |
          echo "حجم کل فایل‌های دانلود شده:"
          du -sh QURAN-NLP/
          echo ""
          echo "بزرگ‌ترین فایل‌ها:"
          find QURAN-NLP/ -type f -exec du -h {} + | sort -rh | head -20

      - name: خروجی را به عنوان Artifact ذخیره کن (برای دانلود نهایی)
        uses: actions/upload-artifact@v4
        with:
          name: QURAN-NLP-Complete
          path: QURAN-NLP/
          retention-days: 7  # ۷ روز در GitHub نگهداری می‌شود
