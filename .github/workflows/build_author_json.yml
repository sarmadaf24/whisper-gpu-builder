name: DOWNLOAD - 21 Missing from Archive.org

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Requests
        run: pip install requests
      
      - name: Download from Archive.org
        shell: python
        run: |
          import os, json, requests, time
          
          BOOKS = [
              # شیعه (۱۲ نفر)
              {"name": "جابر_جعفی", "identifier": "umm-al-kitab_compress", "title": "ام الکتاب - جابر بن یزید الجعفي"},
              {"name": "فضل_شاذان", "identifier": "al-idah", "title": "الإيضاح - فضل بن شاذان"},
              {"name": "قطب_راوندی", "identifier": "AAskZad-1289505", "title": "قصص الأنبياء - قطب الدين الراوندي"},
              {"name": "سید_محمد_مجاهد", "identifier": "", "title": "", "skip": True},
              {"name": "مامقانی", "identifier": "abd-albaqir-253", "title": "مقباس الهداية - عبد الله المامقاني"},
              {"name": "شوشتری", "identifier": "qamus-alrejal", "title": "قاموس الرجال - محمد تقي التستري"},
              {"name": "بهجة", "identifier": "al-rahma-al-wasica", "title": "الرحمة الواسعة - محمد تقي بهجت"},
              {"name": "حسن_سلیمان_حلی", "identifier": "abd-albaqir-119", "title": "المحتضر - الحسن بن سليمان الحلي"},
              {"name": "رضی_الدین_طاووس", "identifier": "20240403_20240403_1946", "title": "اليقين - رضي الدين علي بن طاووس"},
              {"name": "یحیی_سعید_حلی", "identifier": "al-mustadrak-al-mukhtar", "title": "المستدرك المختار - يحيى بن سعيد الحلي"},
              {"name": "خامنه_ای", "identifier": "tfserbraah", "title": "تفسير براءة - علي الخامنئي"},
              {"name": "ملا_خسرو", "identifier": "durrar-al-hukkam", "title": "درر الحكام - ملا خسرو"},
              
              # اهل سنت و علوم (۹ نفر)
              {"name": "ظهیرالدین_بخاری", "identifier": "al-fatawa-al-zahiriyya", "title": "الفتاوى الظهيرية - ظهير الدين البخاري"},
              {"name": "والوالجی", "identifier": "al-fatawa-al-walwalijiyya", "title": "الفتاوى الوالوالجية"},
              {"name": "زرقانی", "identifier": "sharh-al-zarqani", "title": "شرح الزرقاني علي الموطأ"},
              {"name": "بربهاری", "identifier": "sharh-al-sunnah", "title": "شرح السنة - البربهاري"},
              {"name": "خوارزمی_ریاضی", "identifier": "al-jabr-wa-al-muqabala", "title": "الجبر والمقابلة - الخوارزمي"},
              {"name": "مولانا_رومی", "identifier": "masnavi-manavi", "title": "مثنوي معنوي - جلال الدين الرومي"},
              {"name": "ابن_قاسم_مالکی", "identifier": "al-mudawwana", "title": "المدونة الكبری - رواية ابن القاسم"},
              {"name": "جلال_محلی", "identifier": "tafsir-al-jalalayn", "title": "تفسير الجلالين", "already_have": True},
              {"name": "شمس_قدامه", "identifier": "al-sharh-al-kabir", "title": "الشرح الكبير - شمس الدين ابن قدامة", "already_have": True},
          ]
          
          OUTPUT_DIR = "archive_downloads"
          os.makedirs(OUTPUT_DIR, exist_ok=True)
          
          results = {"downloaded": [], "failed": [], "skipped": []}
          
          for book in BOOKS:
              name = book['name']
              
              if book.get('skip'):
                  print(f"\n⏭️ {name}: رد شد (در archive.org نیست)")
                  results['skipped'].append(name)
                  continue
              
              if book.get('already_have'):
                  print(f"\n✅ {name}: قبلاً استخراج شده")
                  results['downloaded'].append({"name": name, "status": "already_have"})
                  continue
              
              identifier = book['identifier']
              title = book['title']
              
              print(f"\n{'='*60}")
              print(f"📥 {name}: {title}")
              print(f"   شناسه: {identifier}")
              
              if not identifier:
                  print(f"   ❌ شناسه نامشخص")
                  results['failed'].append({"name": name, "reason": "no_identifier"})
                  continue
              
              try:
                  # دانلود PDF از archive.org
                  pdf_url = f"https://archive.org/download/{identifier}/{identifier}.pdf"
                  print(f"   🌐 {pdf_url}")
                  
                  headers = {
                      'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
                  }
                  
                  response = requests.get(pdf_url, headers=headers, timeout=120, stream=True)
                  
                  if response.status_code == 200 and len(response.content) > 50000:
                      safe_name = name.replace(" ", "_")
                      filepath = os.path.join(OUTPUT_DIR, f"{safe_name}.pdf")
                      
                      with open(filepath, 'wb') as f:
                          for chunk in response.iter_content(chunk_size=8192):
                              f.write(chunk)
                      
                      file_size = os.path.getsize(filepath)
                      print(f"   ✅ دانلود شد: {file_size:,} bytes ({file_size/(1024*1024):.1f} MB)")
                      results['downloaded'].append({"name": name, "file": filepath, "size_mb": round(file_size/(1024*1024), 1)})
                  else:
                      print(f"   ❌ خطای HTTP: {response.status_code}")
                      results['failed'].append({"name": name, "reason": f"HTTP_{response.status_code}"})
              
              except Exception as e:
                  print(f"   ❌ خطا: {str(e)[:100]}")
                  results['failed'].append({"name": name, "reason": str(e)[:100]})
              
              time.sleep(3)
          
          # ذخیره گزارش
          with open(os.path.join(OUTPUT_DIR, "download_report.json"), 'w', encoding='utf-8') as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*70}")
          print(f"📊 گزارش نهایی:")
          print(f"{'='*70}")
          print(f"✅ دانلود شده: {len(results['downloaded'])}")
          print(f"❌ ناموفق: {len(results['failed'])}")
          print(f"⏭️ رد شده: {len(results['skipped'])}")
          
          if results['failed']:
              print(f"\n📋 ناموفق‌ها:")
              for f in results['failed']:
                  print(f"   • {f['name']}: {f.get('reason', 'N/A')}")
      
      - name: Upload Downloads
        uses: actions/upload-artifact@v4
        with:
          name: ARCHIVE-DOWNLOADS
          path: archive_downloads/
          retention-days: 7
          compression-level: 6
