name: SCAN - 21 Remaining Authors

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: SCAN ALL 21
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              # ۸ نفر گمشده
              {"name": "جابر_جعفی", "patterns": ["JabirJufi", "JabirYazid", "جعفي", "Juci", "تفسیر_جابر"]},
              {"name": "فضل_شاذان", "patterns": ["FadlShadhan", "فضل_شاذان", "ایضاح", "Idah", "نیشابوری_فضل"]},
              {"name": "قطب_راوندی", "patterns": ["QutbRawandi", "راوندي", "خرائج", "Kharacij", "قصص"]},
              {"name": "سید_محمد_مجاهد", "patterns": ["MujahidTabatabai", "مجاهد", "کربلا", "Karbala", "مناهل"]},
              {"name": "مامقانی", "patterns": ["Mamaqani", "مامقاني", "Miqbas", "مقباس", "تنقیح"]},
              {"name": "شوشتری", "patterns": ["Shushtari", "شوشتري", "قاموس", "Qamus", "بهج_الصباغه"]},
              {"name": "محمد_تقی_بهجة", "patterns": ["Bahjat", "بهجت", "MuhammadTaqiBahjat", "رساله_عملیه"]},
              {"name": "حسن_سلیمان_حلی", "patterns": ["HasanSulayman", "حسن_سلیمان", "مختصر_بصایر", "MukhtasarBasair"]},
              
              # ۴ نفر کم حجم
              {"name": "فخر_المحققین_جدید", "patterns": ["FakhrMuhaqqiqin", "فخر_المحققین", "IdahFawaid", "ایضاح_فواید", "ابن_مطهر_حلی"]},
              {"name": "بحرالعلوم_جدید", "patterns": ["BahrCulum", "بحر_علوم", "مهدی_طباطبایی", "MahdiTabatabai", "فایده"]},
              {"name": "ابن_ابی_عقیل_جدید", "patterns": ["IbnAbiCaqil", "عماني", "Cumani", "عقیل", "متمسک"]},
              {"name": "ابن_جنید_جدید", "patterns": ["IbnJunayd", "اسکافی", "Iskafi", "جنید", "مختصر_احمدی"]},
              
              # ۹ نفر فراموش شده
              {"name": "رضی_الدین_بن_طاووس", "patterns": ["RadiDinTawus", "رضی_طاووس", "IbnTawusRadi", "لهوف"]},
              {"name": "ابن_ادریس_حلی", "patterns": ["IbnIdrisHilli", "ادریس_حلي", "Sarair", "سرایٔر"]},
              {"name": "یحیی_بن_سعید_حلی", "patterns": ["YahyaSacid", "یحیی_سعید", "JamicSharaic", "جامع_شرایع"]},
              {"name": "محقق_کرکی", "patterns": ["MuhaqqiqKaraki", "کرکي", "Karaki", "جامع_مقاصد", "JamicMaqasid"]},
              {"name": "ملا_احمد_نراقی", "patterns": ["AhmadNaraqi", "نراقي", "Naraqi", "مستند", "Mustanad"]},
              {"name": "سید_جواد_عاملی", "patterns": ["JawadCamili", "جواد_عاملي", "مفتاح_کرامه", "MiftahKharama"]},
              {"name": "سید_حسین_بروجردی", "patterns": ["Burujirdi", "بروجردي", "HusaynBurujirdi", "تبویب_وسایل"]},
              {"name": "امام_خمینی", "patterns": ["Khumayni", "خمیني", "خمینی", "Khomeini", "تحریر_وسیله"]},
              {"name": "سید_علی_خامنه_ای", "patterns": ["Khaminai", "خامنه_اي", "Khamenei", "خامنه_ای"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              found_real = [i for i in items if i['size_mb'] > 0.5]
              print(f"\n{author['name']}: {len(items)} پوشه ({len(found_real)} قابل قبول)")
              for item in items:
                  mark = "✅" if item['size_mb'] > 0.5 else "⚠️"
                  print(f"   {mark} {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("scan_21_results.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-21-results
          path: scan_21_results.json
          retention-days: 7
