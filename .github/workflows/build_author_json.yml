name: SCAN - Find 10 Authors in OpenITI

on:
  workflow_dispatch:

jobs:
  scan-authors:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        author:
          - name: "جابر بن یزید جعفی"
            patterns: ["JabirJufi", "Jabir", "Jufi", "جعفي", "جعفی", "الجعیف"]
            years: [125, 150]
            
          - name: "فضل بن شاذان نیشابوری"
            patterns: ["FadlShadhan", "Fadl", "Shadhan", "فضل", "شاذان", "نیشابوری"]
            years: [250, 275]
            
          - name: "احمد بن محمد برقی"
            patterns: ["AhmadBarqi", "Barqi", "برقي", "برقی", "محاسن"]
            years: [250, 275, 300]
            
          - name: "محمد بن حسن صفار قمی"
            patterns: ["SaffarQummi", "Saffar", "صفار", "بصائر"]
            years: [275, 300]
            
          - name: "علی بن ابراهیم قمی"
            patterns: ["AliIbrahimQummi", "AliIbrahim", "قمی", "قمي", "تفسیر"]
            years: [300, 325]
            
          - name: "محمد بن یعقوب کلینی"
            patterns: ["Kulayni", "Kulini", "كليني", "کلینی", "كافي", "کافی"]
            years: [325, 350]
            
          - name: "احمد بن علی نجاشی"
            patterns: ["Najashi", "نجاشي", "نجاشی", "رجال"]
            years: [425, 450, 475]
            
          - name: "محمد بن عمر کشی"
            patterns: ["Kashshi", "Kashi", "كشي", "کشی", "رجال"]
            years: [325, 350]
            
          - name: "محمد بن علی صدوق"
            patterns: ["Saduq", "Saduk", "صدوق", "بابویه", "Babawayh", "فقیه"]
            years: [375, 400]
            
          - name: "محمد بن محمد مفید"
            patterns: ["Mufid", "مفيد", "مفید", "ارشاد", "Irshad"]
            years: [400, 425]
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Scan OpenITI for Author
        shell: python
        run: |
          import os
          import subprocess
          import json
          
          author = ${{ toJson(matrix.author) }}
          author_name = author['name']
          patterns = author['patterns']
          possible_years = author['years']
          
          print("=" * 70)
          print(f"🔍 اسکن: {author_name}")
          print("=" * 70)
          
          # مخازن برای جستجو
          repos_to_check = []
          for y in possible_years:
              century = (y // 100) * 100
              repos_to_check.append(f"{century:04d}AH")
              
              # مخازن اطراف هم
              if century >= 100:
                  repos_to_check.append(f"{century-25:04d}AH")
              repos_to_check.append(f"{century+25:04d}AH")
          
          # حذف تکراری‌ها
          repos_to_check = sorted(set(repos_to_check))
          
          all_found = []
          
          for repo_name in repos_to_check:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = f"repo_{repo_name}"
              
              print(f"\n  📦 بررسی مخزن {repo_name}...", end=" ")
              
              # کلون اگر وجود نداشته باشد
              if not os.path.exists(target_dir):
                  result = subprocess.run(
                      ["git", "clone", "--depth", "1", "--single-branch", repo_url, target_dir],
                      capture_output=True, text=True
                  )
                  if result.returncode != 0:
                      print("❌ (کلون نشد)")
                      continue
              
              data_dir = os.path.join(target_dir, "data")
              if not os.path.exists(data_dir):
                  print("❌ (data ندارد)")
                  continue
              
              # جستجو با همه الگوها
              repo_found = []
              for pattern in patterns:
                  for folder in sorted(os.listdir(data_dir)):
                      if pattern.lower() in folder.lower():
                          if folder not in repo_found:
                              repo_found.append(folder)
              
              if repo_found:
                  print(f"✅ {len(repo_found)} کتاب")
                  for f in repo_found:
                      print(f"      📁 {f}")
                      all_found.append({
                          "repo": repo_name,
                          "folder": f
                      })
              else:
                  print("❌")
                  
                  # حذف مخازن بدون نتیجه برای صرفه‌جویی در فضا
                  subprocess.run(["rm", "-rf", target_dir], check=False)
          
          # ذخیره نتایج
          result = {
              "author_name": author_name,
              "patterns_used": patterns,
              "repos_checked": repos_to_check,
              "total_found": len(all_found),
              "books": all_found
          }
          
          safe_name = author_name.replace(" ", "_")[:30]
          with open(f"scan_result_{safe_name}.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          
          print(f"\n  {'='*60}")
          print(f"  📊 نتیجه برای {author_name}:")
          print(f"     📚 کتاب پیدا شده: {len(all_found)}")
          print(f"     📦 مخازن بررسی شده: {len(repos_to_check)}")
          print(f"  {'='*60}\n")
          
          if len(all_found) == 0:
              print("  ⚠️  هیچ کتابی در OpenITI یافت نشد!")
              print("  💡 باید از منابع دیگر استفاده کرد.")
      
      - name: Upload Scan Result
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ matrix.author.name }}
          path: scan_result_*.json
          retention-days: 7
