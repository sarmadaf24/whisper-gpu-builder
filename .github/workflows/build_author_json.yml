name: INSPECT - Allama Hilli Structure

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Clone & Inspect
        shell: python
        run: |
          import os, subprocess, json
          from collections import defaultdict
          
          repo_url = "https://github.com/OpenITI/0750AH.git"
          target_dir = "repo"
          author_folder = "0726CallamaHilli"
          
          print("📥 کلون مخزن 0750AH...")
          subprocess.run(["git", "clone", "--depth", "1", repo_url, target_dir], check=True)
          
          folder_path = os.path.join(target_dir, "data", author_folder)
          
          if not os.path.exists(folder_path):
              print(f"❌ پوشه {author_folder} یافت نشد!")
              exit(1)
          
          print(f"\n{'='*70}")
          print(f"📁 بررسی: {author_folder}")
          print(f"{'='*70}")
          
          # آمار کلی
          total_files = 0
          total_size = 0
          extensions = defaultdict(lambda: {"count": 0, "size": 0})
          subfolders = []
          
          for root, dirs, files in os.walk(folder_path):
              # محاسبه عمق
              rel_path = os.path.relpath(root, folder_path)
              if rel_path != '.':
                  subfolders.append(rel_path)
              
              for file in files:
                  file_path = os.path.join(root, file)
                  size = os.path.getsize(file_path)
                  total_files += 1
                  total_size += size
                  
                  ext = os.path.splitext(file)[1] or '(بدون پسوند)'
                  extensions[ext]["count"] += 1
                  extensions[ext]["size"] += size
          
          print(f"\n📊 آمار کلی:")
          print(f"   📁 زیرپوشه: {len(subfolders)}")
          print(f"   📄 فایل: {total_files}")
          print(f"   💾 حجم کل: {total_size:,} bytes ({total_size/(1024*1024):.1f} MB)")
          
          print(f"\n📋 انواع فایل‌ها:")
          for ext, info in sorted(extensions.items(), key=lambda x: x[1]['size'], reverse=True):
              count = info['count']
              size = info['size']
              print(f"   {ext:20s} | {count:4d} فایل | {size:12,} bytes | {size/(1024*1024):7.1f} MB")
          
          print(f"\n📁 زیرپوشه‌ها:")
          for sf in sorted(subfolders):
              sf_path = os.path.join(folder_path, sf)
              sf_size = sum(os.path.getsize(os.path.join(sf_path, f)) 
                           for f in os.listdir(sf_path) if os.path.isfile(os.path.join(sf_path, f)))
              print(f"   📁 {sf} ({sf_size:,} bytes)")
          
          print(f"\n📄 فایل‌های سطح اول:")
          for item in sorted(os.listdir(folder_path)):
              item_path = os.path.join(folder_path, item)
              if os.path.isfile(item_path):
                  size = os.path.getsize(item_path)
                  print(f"   📄 {item} ({size:,} bytes)")
                  
                  # نمایش محتوای ۲۰۰ کاراکتر اول
                  try:
                      with open(item_path, 'r', encoding='utf-8') as f:
                          preview = f.read(200)
                      print(f"      └─ {preview[:150]}...")
                  except:
                      print(f"      └─ (قابل خواندن نیست)")
          
          # نمایش README.md
          readme_path = os.path.join(folder_path, "README.md")
          if os.path.exists(readme_path):
              print(f"\n📋 README.md:")
              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read(500)
              print(content)
