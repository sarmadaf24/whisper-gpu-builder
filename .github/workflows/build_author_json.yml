name: DEEP SEARCH - 12 Missing Shia Authors

on:
  workflow_dispatch:

jobs:
  deep-search:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Deep Search All Repos
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "جابر_جعفی", "patterns": ["JabirJufi", "JabirYazid", "جابر_جعفي", "JabirJuci", "تفسیر_جابر"]},
              {"name": "فضل_شاذان", "patterns": ["FadlIbnShadhan", "فضل_شاذان", "ایضاح", "علل_شاذان", "FadlNaysaburi", "نیشابوری_فضل"]},
              {"name": "قطب_راوندی", "patterns": ["QutbRawandi", "قطب_راوندي", "خرائج", "Kharacij", "قصص_انبیا"]},
              {"name": "فخر_المحققین", "patterns": ["FakhrMuhaqqiqin", "فخر_المحققین", "IbnMutahhar", "ایضاح_فواید", "IdahFawaid"]},
              {"name": "بحرالعلوم", "patterns": ["BahrCulum", "بحر_علوم", "مهدی_طباطبایی", "MahdiTabatabai", "فایده", "رجال_بحرالعلوم"]},
              {"name": "سید_محمد_مجاهد", "patterns": ["MuhammadMujahid", "مجاهد_طباطبایی", "کربلا", "Karbala", "مناهل", "MujahidTabatabai"]},
              {"name": "ابن_ابی_عقیل", "patterns": ["IbnAbiCaqil", "عماني", "Cumani", "عقیل_عمانی", "متمسک"]},
              {"name": "ابن_جنید", "patterns": ["IbnJunayd", "اسکافی", "Iskafi", "جنید_اسکافی", "مختصر_احمدی"]},
              {"name": "مامقانی", "patterns": ["Mamaqani", "مامقاني", "مقباس", "Miqbas", "تنقیح", "Tanqih"]},
              {"name": "شوشتری", "patterns": ["Shushtari", "شوشتري", "قاموس", "Qamus", "بهج_الصباغه"]},
              {"name": "بهجة", "patterns": ["Bahjat", "بهجت", "MuhammadTaqiBahjat", "فقه_بهجت", "رساله_عملیه"]},
              {"name": "حسن_سلیمان_حلی", "patterns": ["HasanIbnSulayman", "حسن_سلیمان", "مختصر_بصایر", "MukhtasarBasair", "محاسن"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              print(f"\n{author['name']}: {len(items)} پوشه")
              for item in items:
                  print(f"   📁 {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("deep_search_12.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: deep-search-12-results
          path: deep_search_12.json
          retention-days: 7
