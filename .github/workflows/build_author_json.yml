name: DIRECT SHAMELA SEARCH

on:
  workflow_dispatch:

jobs:
  search-shamela:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install requests
      
      - name: Search Shamela Directly
        shell: python
        run: |
          import requests, json, time, urllib.parse
          
          AUTHORS = [
              {"name": "جابر_جعفی", "query": "جابر بن يزيد الجعفي"},
              {"name": "فضل_شاذان", "query": "فضل بن شاذان"},
              {"name": "قطب_راوندی", "query": "قطب الدين الراوندي"},
              {"name": "مامقانی", "query": "عبد الله المامقاني"},
              {"name": "شوشتری", "query": "محمد تقي التستري"},
              {"name": "حسن_سلیمان_حلی", "query": "الحسن بن سليمان الحلي"},
              {"name": "فخر_المحققین", "query": "فخر المحققين"},
              {"name": "رضی_الدین_طاووس", "query": "رضي الدين علي بن طاووس"},
              {"name": "یحیی_سعید_حلی", "query": "يحيى بن سعيد الحلي"},
              {"name": "بهجة", "query": "محمد تقي بهجت"},
              {"name": "سید_محمد_مجاهد", "query": "محمد المجاهد الطباطبائي"},
              {"name": "خامنه_ای", "query": "علي الخامنئي"},
          ]
          
          results = {}
          
          for author in AUTHORS:
              name = author['name']
              query = author['query']
              
              print(f"\n{'='*60}")
              print(f"🔍 {name}: {query}")
              print(f"{'='*60}")
              
              try:
                  # جستجو در شامله
                  search_url = f"https://shamela.ws/search?q={urllib.parse.quote(query)}"
                  print(f"   🌐 {search_url}")
                  
                  headers = {
                      'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                      'Accept': 'text/html,application/xhtml+xml',
                      'Accept-Language': 'ar,en;q=0.9',
                  }
                  
                  response = requests.get(search_url, headers=headers, timeout=30)
                  
                  if response.status_code == 200:
                      html = response.text
                      
                      # استخراج لینک کتاب‌ها
                      import re
                      book_links = re.findall(r'href="(/book/(\d+)[^"]*)"[^>]*>([^<]+)', html)
                      
                      author_books = []
                      seen_ids = set()
                      
                      for link, book_id, title in book_links:
                          if book_id not in seen_ids:
                              seen_ids.add(book_id)
                              clean_title = re.sub(r'<[^>]+>', '', title).strip()
                              book_url = f"https://shamela.ws{link}"
                              epub_url = f"https://shamela.ws/book/{book_id}/epub"
                              
                              author_books.append({
                                  "id": book_id,
                                  "title": clean_title[:100],
                                  "url": book_url,
                                  "epub_url": epub_url
                              })
                              
                              print(f"   📚 [{book_id}] {clean_title[:80]}")
                              if len(author_books) >= 5:
                                  break
                      
                      results[name] = {
                          "query": query,
                          "total_found": len(author_books),
                          "books": author_books
                      }
                  else:
                      results[name] = {"error": f"HTTP {response.status_code}"}
                      print(f"   ❌ خطای HTTP: {response.status_code}")
                  
              except Exception as e:
                  results[name] = {"error": str(e)}
                  print(f"   ❌ خطا: {e}")
              
              time.sleep(2)
          
          with open("shamela_search_results.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*60}")
          print("📊 جمع‌بندی:")
          for name, data in results.items():
              if 'error' in data:
                  print(f"   ❌ {name}: {data['error']}")
              else:
                  print(f"   {name}: {data['total_found']} کتاب")
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: shamela-search-results
          path: shamela_search_results.json
          retention-days: 7
