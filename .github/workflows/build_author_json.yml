name: DEEP SCAN - 5 Missing Hanafi

on:
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Deep Scan
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "ابوحنیفه", "patterns": ["AbuHanifa", "حنيفة", "Hanifa", "فقه_اکبر", "Musnad_AbuHanifa", "نعمان", "Nucman", "ابوحنیفه", "حنفی", "Hanafi"]},
              {"name": "ظهیرالدین_بخاری", "patterns": ["ZahirDinBukhari", "ظهیر_بخاری", "ZahirBukhari", "فتاوی_ظهیریه", "Zahiriyya", "ظهیریه", "ZahirDinMuhammadBukhari"]},
              {"name": "ملاخسرو", "patterns": ["MullaKhusru", "ملاخسرو", "Khusru", "خسرو", "DurarHukkam", "درر_حکام", "GhurarAhkam", "غرر_احکام", "MuhammadKhusru"]},
              {"name": "والوالجی", "patterns": ["Walwaliji", "والوالجي", "Walwalij", "فتاوی_والوالجیه", "ZahirDinWalwaliji", "Walwalijiyya"]},
              {"name": "خوارزمی", "patterns": ["Khawarizmi", "خوارزمي", "Khwarizmi", "MafatihCulum", "مفاتیح_علوم", "AbuBakrKhawarizmi", "ابوبکر_خوارزمي"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              found_real = [i for i in items if i['size_mb'] > 0.3]
              print(f"\n{author['name']}: {len(items)} پوشه ({len(found_real)} قابل قبول)")
              for item in items:
                  mark = "✅" if item['size_mb'] > 0.3 else "⚠️"
                  print(f"   {mark} {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("deep_hanafi_5.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: deep-hanafi-5-results
          path: deep_hanafi_5.json
          retention-days: 7
