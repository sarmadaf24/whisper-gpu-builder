name: DEEP SCAN - 6 Missing Authors

on:
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        author:
          - name: "کلینی"
            deep_patterns: ["Kulayni", "Kulini", "Kulayn", "Kafi", "Kāfī", "كافي", "کلینی", "كليني", "الكليني", "UsulKafi", "FuruKafi", "RawdatKafi"]
            all_repos: true
            
          - name: "جابر_جعفی"
            deep_patterns: ["Jabir", "Jufi", "Juci", "جعفي", "جعفی", "الجعیف", "جابر", "JabirJuci", "JabirYazid"]
            all_repos: true
            
          - name: "فضل_شاذان"
            deep_patterns: ["FadlShadhan", "Fadl", "Shadhan", "فضل", "شاذان", "نیشابوری", "Naysaburi", "Nishapuri"]
            all_repos: true
            
          - name: "علی_قمی"
            deep_patterns: ["AliIbrahim", "Qummi", "Qomi", "قمي", "قمی", "TafsirQummi", "تفسیر", "تفسير"]
            all_repos: true
            
          - name: "نجاشی"
            deep_patterns: ["Najashi", "نجاشي", "نجاشی", "RijalNajashi", "Fihrist", "فهرست"]
            all_repos: true
            
          - name: "کشی"
            deep_patterns: ["Kashshi", "Kashi", "كشي", "کشی", "RijalKashshi", "Ikhtiyar", "اختیار"]
            all_repos: true
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Deep Scan All Repos
        shell: python
        run: |
          import os, json, subprocess
          
          author = ${{ toJson(matrix.author) }}
          author_name = author['name']
          patterns = author['deep_patterns']
          
          print("=" * 70)
          print(f"🔬 جستجوی عمیق: {author_name}")
          print(f"🔍 الگوها: {', '.join(patterns[:5])}...")
          print("=" * 70)
          
          # همه مخازن
          repos_to_check = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          all_found = []
          
          for repo_name in repos_to_check:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = f"repo_{repo_name}"
              
              print(f"  📦 {repo_name}...", end=" ")
              
              clone_result = subprocess.run(
                  ["git", "clone", "--depth", "1", "--single-branch", repo_url, target_dir],
                  capture_output=True, text=True
              )
              
              if clone_result.returncode != 0:
                  print("∅")
                  continue
              
              data_dir = os.path.join(target_dir, "data")
              if not os.path.exists(data_dir):
                  subprocess.run(["rm", "-rf", target_dir], check=False)
                  print("∅")
                  continue
              
              # جستجو
              repo_found = []
              for folder in sorted(os.listdir(data_dir)):
                  folder_lower = folder.lower()
                  for pattern in patterns:
                      if pattern.lower() in folder_lower:
                          repo_found.append(folder)
                          break
              
              if repo_found:
                  print(f"🎯 {len(repo_found)}!")
                  for f in repo_found:
                      folder_path = os.path.join(data_dir, f)
                      total_size = 0
                      has_mARkdown = False
                      
                      if os.path.isdir(folder_path):
                          for root, _, files in os.walk(folder_path):
                              for file in files:
                                  file_path = os.path.join(root, file)
                                  total_size += os.path.getsize(file_path)
                                  if file.endswith('.mARkdown'):
                                      has_mARkdown = True
                      
                      print(f"      📁 {f} ({total_size:,}B) {'📝' if has_mARkdown else '⚠️'}")
                      all_found.append({
                          "repo": repo_name,
                          "folder": f,
                          "size_bytes": total_size,
                          "has_mARkdown": has_mARkdown
                      })
              else:
                  print(".")
              
              if not repo_found:
                  subprocess.run(["rm", "-rf", target_dir], check=False)
          
          # ذخیره
          result = {
              "author": author_name,
              "repos_checked": len(repos_to_check),
              "total_found": len(all_found),
              "books": all_found
          }
          
          safe_name = author_name.replace(" ", "_")
          with open(f"deepscan_{safe_name}.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          
          print(f"\n📊 {author_name}: {len(all_found)} کتاب پیدا شد")
          print("=" * 70)
      
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: deepscan-${{ strategy.job-index }}
          path: deepscan_*.json
          retention-days: 7
