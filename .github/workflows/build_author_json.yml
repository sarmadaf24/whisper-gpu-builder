name: Build Author JSON - Dhahabi

on:
  workflow_dispatch:

jobs:
  build-dhahabi:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: 🔍 Find exact author ID first
        shell: python
        run: |
          import os
          import subprocess
          
          repo_url = "https://github.com/OpenITI/0700AH.git"
          target_dir = "openiti_repo"
          
          if not os.path.exists(target_dir):
              subprocess.run(["git", "clone", "--depth", "1", repo_url, target_dir], check=True)
          
          data_dir = os.path.join(target_dir, "data")
          
          # جستجوی همه پوشه‌هایی که "Dhahabi" یا "dhahabi" در نام دارند
          matching_folders = []
          for folder in sorted(os.listdir(data_dir)):
              if 'dhahabi' in folder.lower():
                  matching_folders.append(folder)
          
          print("=" * 60)
          print(f"پوشه‌های مرتبط با ذهبی در OpenITI:")
          print("=" * 60)
          for i, folder in enumerate(matching_folders, 1):
              print(f"{i}. {folder}")
          
          if not matching_folders:
              print("\n❌ هیچ پوشه‌ای با نام Dhahabi یافت نشد!")
              print("\n🔍 بیایید چند پوشه اول را ببینیم:")
              all_folders = sorted(os.listdir(data_dir))
              for f in all_folders[:20]:
                  print(f"  - {f}")
      
      - name: 🔨 Build with correct ID
        shell: python
        run: |
          import os
          import sys
          import json
          import yaml
          import subprocess
          import glob
          
          # ====== تنظیمات ======
          AUTHOR_NAME = "شمس الدین ذهبی"
          SEARCH_PATTERN = "dhahabi"  # جستجوی غیرحساس به حروف
          DEATH_YEAR = 748
          OUTPUT_FILE = "dhahabi.json"
          # =====================
          
          def clone_repo():
              century = (DEATH_YEAR // 100) * 100
              repo_name = f"{century:04d}AH"
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = "openiti_repo"
              
              if not os.path.exists(target_dir):
                  print(f"📥 کلون کردن {repo_name}...")
                  subprocess.run(["git", "clone", "--depth", "1", repo_url, target_dir], check=True)
              return target_dir
          
          def find_by_pattern(repo_dir, pattern):
              """پیدا کردن پوشه‌ها بر اساس الگوی نام (غیرحساس به حروف)"""
              data_dir = os.path.join(repo_dir, "data")
              folders = []
              
              if not os.path.exists(data_dir):
                  return folders
              
              for folder in sorted(os.listdir(data_dir)):
                  if pattern.lower() in folder.lower():
                      folders.append(os.path.join(data_dir, folder))
              
              return folders
          
          def parse_metadata(readme_path):
              try:
                  with open(readme_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if content.startswith('---'):
                      parts = content.split('---')
                      if len(parts) >= 3:
                          return yaml.safe_load(parts[1])
                  return {}
              except:
                  return {}
          
          def extract_text(book_folder):
              texts = []
              for root, _, files in os.walk(book_folder):
                  for file in sorted(files):
                      if file == 'README.md':
                          continue
                      if file.endswith(('.mARkdown', '.txt', '.md')):
                          try:
                              with open(os.path.join(root, file), 'r', encoding='utf-8') as f:
                                  content = f.read()
                                  if content.strip():
                                      texts.append(content)
                          except:
                              pass
              return "\n\n".join(texts)
          
          # ====== اجرا ======
          print(f"\n{'='*60}")
          print(f"🔄 پردازش: {AUTHOR_NAME}")
          print(f"{'='*60}\n")
          
          repo_dir = clone_repo()
          folders = find_by_pattern(repo_dir, SEARCH_PATTERN)
          
          print(f"📚 {len(folders)} پوشه یافت شد.\n")
          
          if not folders:
              print("❌ هیچ کتابی یافت نشد. در حال ایجاد فایل خالی...")
              data = {
                  "author_name": AUTHOR_NAME,
                  "death_year": DEATH_YEAR,
                  "source": "OpenITI",
                  "total_books": 0,
                  "books": []
              }
              with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              sys.exit(0)
          
          all_books = []
          
          for i, folder in enumerate(folders, 1):
              folder_name = os.path.basename(folder)
              print(f"📖 [{i}/{len(folders)}] {folder_name}")
              
              readme = os.path.join(folder, 'README.md')
              metadata = {}
              if os.path.exists(readme):
                  metadata = parse_metadata(readme)
              
              title = metadata.get('title') or metadata.get('Title') or folder_name
              text = extract_text(folder)
              
              all_books.append({
                  "folder_name": folder_name,
                  "title": title,
                  "metadata": metadata,
                  "text_length": len(text),
                  "text": text
              })
              
              print(f"   ✅ {title}")
              print(f"   📝 {len(text):,} chars")
          
          # خروجی JSON
          data = {
              "author_name": AUTHOR_NAME,
              "death_year": DEATH_YEAR,
              "source": "OpenITI",
              "total_books": len(all_books),
              "books": all_books
          }
          
          with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          size_mb = os.path.getsize(OUTPUT_FILE) / (1024 * 1024)
          
          print(f"\n{'='*60}")
          print(f"✅ تمام شد!")
          print(f"   📚 کتاب‌ها: {len(all_books)}")
          print(f"   💾 حجم: {size_mb:.2f} MB")
          print(f"{'='*60}")
      
      - name: 📊 خلاصه خروجی
        run: |
          echo "=== اطلاعات فایل ==="
          ls -lh dhahabi.json
          echo ""
          echo "=== فهرست کتاب‌ها ==="
          python3 -c "
          import json
          with open('dhahabi.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(f'مجموع: {data[\"total_books\"]} کتاب')
          print()
          for i, b in enumerate(data['books'], 1):
              print(f'{i}. {b[\"title\"]}')
              print(f'   حجم متن: {b[\"text_length\"]:,} chars')
              print(f'   پوشه: {b[\"folder_name\"]}')
              print()
          "
      
      - name: 📤 آپلود JSON
        uses: actions/upload-artifact@v4
        with:
          name: dhahabi-complete-works
          path: dhahabi.json
          retention-days: 90
          compression-level: 6
