name: FINAL EXTRACT - 16 Shia Authors

on:
  workflow_dispatch:

jobs:
  extract-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        author:
          - name: "ثابت_بن_دینار_ابوحمزه_ثمالی"
            folder: "0148AbuHamzaThumali"
            repo: "0150AH"
            title_ar: "ثابت بن دينار (أبو حمزة الثمالي)"
            
          - name: "احمد_بن_محمد_برقی"
            folder: "0274AhmadBarqi"
            repo: "0275AH"
            title_ar: "أحمد بن محمد بن خالد البرقي"
            
          - name: "محمد_بن_حسن_صفار_قمی"
            folder: "0290IbnHasanSaffar"
            repo: "0300AH"
            title_ar: "محمد بن الحسن الصفار القمي"
            
          - name: "علی_بن_ابراهیم_قمی"
            folder: "0329IbnIbrahimQummi"
            repo: "0350AH"
            title_ar: "علي بن إبراهيم القمي"
            
          - name: "محمد_بن_یعقوب_کلینی"
            folder: "0329IbnYacqubKulayni"
            repo: "0350AH"
            title_ar: "محمد بن يعقوب الكليني (ثقة الإسلام)"
            
          - name: "احمد_بن_علی_نجاشی"
            folder: "0450Najashi"
            repo: "0450AH"
            title_ar: "أحمد بن علي النجاشي"
            
          - name: "محمد_بن_عمر_کشی"
            folder: "0329IbnCumarKashshi"
            repo: "0350AH"
            title_ar: "محمد بن عمر الكشي"
            
          - name: "محمد_بن_علی_صدوق"
            folder: "0381IbnBabawayhSaduq"
            repo: "0400AH"
            title_ar: "محمد بن علي بن بابويه (الشيخ الصدوق)"
            
          - name: "محمد_بن_محمد_مفید"
            folder: "0413ShaykhMufid"
            repo: "0425AH"
            title_ar: "محمد بن محمد بن النعمان (الشيخ المفيد)"
            
          - name: "محمد_بن_حسین_سید_رضی"
            folder: "0406SharifRadi"
            repo: "0425AH"
            title_ar: "محمد بن الحسين (الشريف الرضي)"
            
          - name: "علی_بن_حسین_سید_مرتضی"
            folder: "0436SharifMurtada"
            repo: "0450AH"
            title_ar: "علي بن الحسين (الشريف المرتضى)"
            
          - name: "محمد_بن_حسن_طوسی"
            folder: "0460ShaykhTusi"
            repo: "0475AH"
            title_ar: "محمد بن الحسن الطوسي (شيخ الطائفة)"
            
          - name: "محمد_بن_علی_ابن_شهرآشوب"
            folder: "0588IbnShahrAshub"
            repo: "0600AH"
            title_ar: "محمد بن علي (ابن شهرآشوب)"
            
          - name: "عمادالدین_طبری"
            folder: "0504IbnMuhammadCimadDinTabari"
            repo: "0525AH"
            title_ar: "الحسن بن علي (عماد الدين الطبري)"
            
          - name: "جعفر_بن_حسن_محقق_حلی"
            folder: "0676IbnHasanMuhaqqiqHilli"
            repo: "0700AH"
            title_ar: "جعفر بن الحسن (المحقق الحلي)"
            
          - name: "حسن_بن_یوسف_علامه_حلی"
            folder: "0726CallamaHilli"
            repo: "0750AH"
            title_ar: "الحسن بن يوسف (العلامة الحلي)"
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Extract Author Books
        shell: python
        run: |
          import os, json, subprocess, re, yaml
          
          author = ${{ toJson(matrix.author) }}
          author_name = author['name']
          folder_name = author['folder']
          repo_name = author['repo']
          title_ar = author['title_ar']
          
          output_dir = f"output/{author_name}"
          os.makedirs(output_dir, exist_ok=True)
          
          print("=" * 70)
          print(f"📚 استخراج: {title_ar}")
          print("=" * 70)
          
          # کلون مخزن
          repo_dir = f"repo_{repo_name}"
          if not os.path.exists(repo_dir):
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              print(f"📥 کلون {repo_name}...")
              result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                     capture_output=True, text=True)
              if result.returncode != 0:
                  print("❌ کلون ناموفق")
                  exit(1)
          
          folder_path = os.path.join(repo_dir, "data", folder_name)
          if not os.path.exists(folder_path):
              print("❌ پوشه یافت نشد")
              exit(1)
          
          # خواندن فایل YML اصلی برای فراداده نویسنده
          author_yml_path = os.path.join(folder_path, f"{folder_name}.yml")
          author_metadata = {}
          if os.path.exists(author_yml_path):
              try:
                  with open(author_yml_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                      # استخراج فیلدهای مهم
                      for line in content.split('\n'):
                          if ':' in line and not line.startswith('#'):
                              parts = line.split(':', 1)
                              if len(parts) == 2:
                                  key = parts[0].strip().replace(' ', '_')
                                  val = parts[1].strip()
                                  if val and val != 'NODATA':
                                      author_metadata[key] = val
              except:
                  pass
          
          # توابع تمیزکاری
          def clean_text(raw_text):
              lines = raw_text.split('\n')
              clean_lines = []
              
              for line in lines:
                  # حذف META
                  if re.match(r'^#META#', line.strip()):
                      continue
                  # حذف Header
                  if line.strip() == '#META#Header#End#':
                      continue
                  # حذف PageV
                  if re.match(r'^PageV\d+P\d+', line.strip()):
                      continue
                  # حذف ms
                  if re.match(r'^ms\d+$', line.strip()):
                      continue
                  # حذف ### | ... و خطوط فهرست
                  if re.match(r'^###\s*\|', line.strip()):
                      continue
                  if re.match(r'^###\s*\|\|', line.strip()):
                      continue
                  
                  # اصلاح ~~
                  line = line.replace('~~', '')
                  
                  # حذف # از ابتدا
                  if line.startswith('# '):
                      line = line[2:]
                  elif line.startswith('## '):
                      line = line[3:]
                  elif line.startswith('### '):
                      line = line[4:]
                  
                  clean_lines.append(line)
              
              # حذف خطوط خالی متوالی
              result = []
              prev_empty = False
              for line in clean_lines:
                  is_empty = not line.strip()
                  if is_empty and prev_empty:
                      continue
                  result.append(line)
                  prev_empty = is_empty
              
              return '\n'.join(result).strip()
          
          # جستجوی همه فایل‌های متنی بزرگ
          books_extracted = []
          book_counter = 0
          
          for root, dirs, files in os.walk(folder_path):
              for file in sorted(files):
                  file_path = os.path.join(root, file)
                  try:
                      size = os.path.getsize(file_path)
                  except:
                      continue
                  
                  # فقط فایل‌های بزرگتر از ۵۰ کیلوبایت
                  if size < 50000:
                      continue
                  
                  # رد کردن فایل‌های YML و MD
                  if file.endswith('.yml') or file.endswith('.md'):
                      continue
                  
                  book_counter += 1
                  
                  # نام پوشه والد = نام کتاب
                  rel_path = os.path.relpath(root, folder_path)
                  book_folder_name = os.path.basename(rel_path) if rel_path != '.' else 'root'
                  
                  # استخراج نام کتاب از نام پوشه
                  book_short = book_folder_name.replace(f"{folder_name}.", '') if book_folder_name != 'root' else file
                  
                  print(f"\n📖 [{book_counter}] {book_short}")
                  print(f"   📄 {file} ({size:,} bytes)")
                  
                  # خواندن فایل
                  try:
                      with open(file_path, 'r', encoding='utf-8') as f:
                          raw_text = f.read()
                  except:
                      print(f"   ⚠️ قابل خواندن نیست")
                      continue
                  
                  # استخراج فراداده از META
                  meta = {}
                  meta['book_title'] = re.search(r'#META#\s+020\.BookTITLE\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['author_name'] = re.search(r'#META#\s+010\.AuthorNAME\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['subject'] = re.search(r'#META#\s+021\.BookSUBJ\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['volumes'] = re.search(r'#META#\s+022\.BookVOLS\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['editor'] = re.search(r'#META#\s+040\.EdEDITOR\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['publisher'] = re.search(r'#META#\s+043\.EdPUBLISHER\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['edition'] = re.search(r'#META#\s+041\.EdNUMBER\s+::\s+(.+?)(?:\n|$)', raw_text)
                  meta['shamela_id'] = re.search(r'#META#\s+030\.LibURI\s+::\s+(.+?)(?:\n|$)', raw_text)
                  
                  metadata_clean = {}
                  for k, v in meta.items():
                      if v and v.group(1).strip() not in ['NODATA', 'NOTGIVEN', '']:
                          metadata_clean[k] = v.group(1).strip()
                  
                  # عنوان کتاب
                  title = metadata_clean.get('book_title', book_short)
                  
                  # تمیزکاری
                  clean = clean_text(raw_text)
                  
                  # ذخیره فایل TXT
                  safe_filename = re.sub(r'[^\w\-_]', '_', book_short)[:80]
                  txt_path = os.path.join(output_dir, f"{safe_filename}.txt")
                  
                  with open(txt_path, 'w', encoding='utf-8') as f:
                      f.write(f"العنوان: {title}\n")
                      if 'author_name' in metadata_clean:
                          f.write(f"المؤلف: {metadata_clean['author_name']}\n")
                      if 'subject' in metadata_clean:
                          f.write(f"الموضوع: {metadata_clean['subject']}\n")
                      f.write("=" * 70 + "\n\n")
                      f.write(clean)
                  
                  books_extracted.append({
                      "title": title,
                      "file": file,
                      "folder": book_folder_name,
                      "size_bytes": size,
                      "text_length": len(clean),
                      "txt_file": safe_filename + ".txt",
                      "metadata": metadata_clean
                  })
                  
                  print(f"   ✅ {title}")
                  print(f"   📝 {len(clean):,} chars")
                  print(f"   💾 {txt_path}")
          
          # ذخیره JSON نویسنده
          author_json = {
              "author_name_arabic": title_ar,
              "author_name_folder": author_name,
              "source_repo": repo_name,
              "source_folder": folder_name,
              "total_books": len(books_extracted),
              "total_size_mb": round(sum(b['size_bytes'] for b in books_extracted) / (1024*1024), 2),
              "author_metadata": author_metadata,
              "books": books_extracted
          }
          
          json_path = os.path.join(output_dir, f"{author_name}.json")
          with open(json_path, 'w', encoding='utf-8') as f:
              json.dump(author_json, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*70}")
          print(f"✅ {title_ar}: {len(books_extracted)} کتاب استخراج شد")
          print(f"📄 JSON: {json_path}")
          print(f"{'='*70}")
      
      - name: Upload Author Output
        uses: actions/upload-artifact@v4
        with:
          name: extract-${{ matrix.author.name }}
          path: output/${{ matrix.author.name }}/
          retention-days: 7
  
  # تجمیع نهایی
  package-all:
    needs: extract-all
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Final Package
        run: |
          mkdir -p final_package
          
          # انتقال همه پوشه‌ها
          for dir in extract-*/; do
            author_name=$(echo "$dir" | sed 's/extract-//' | sed 's/\///')
            if [ -d "$dir" ]; then
              cp -r "$dir" "final_package/$author_name"
            fi
          done
          
          # ایجاد فهرست کلی
          echo "📊 ایجاد فهرست نهایی..."
          python3 -c "
          import json, os, glob
          
          summary = []
          total_books = 0
          total_size = 0
          
          for author_dir in sorted(os.listdir('final_package')):
              json_files = glob.glob(f'final_package/{author_dir}/*.json')
              if json_files:
                  with open(json_files[0], 'r', encoding='utf-8') as f:
                      data = json.load(f)
                      summary.append({
                          'author': data['author_name_arabic'],
                          'folder': author_dir,
                          'total_books': data['total_books'],
                          'total_size_mb': data['total_size_mb']
                      })
                      total_books += data['total_books']
                      total_size += data['total_size_mb']
          
          final_summary = {
              'total_authors': len(summary),
              'total_books': total_books,
              'total_size_mb': round(total_size, 2),
              'authors': summary
          }
          
          with open('final_package/00_INDEX.json', 'w', encoding='utf-8') as f:
              json.dump(final_summary, f, ensure_ascii=False, indent=2)
          
          print(f'نویسندگان: {len(summary)}')
          print(f'کل کتاب‌ها: {total_books}')
          print(f'حجم کل: {total_size:.1f} MB')
          "
          
          echo ""
          echo "📦 فایل‌های نهایی:"
          ls -lh final_package/
      
      - name: Upload Final Package
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-ALL-16-AUTHORS
          path: final_package/
          retention-days: 7
