name: SEARCH - 12 Missing in Archive.org

on:
  workflow_dispatch:

jobs:
  search-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Search Archive.org
        shell: python
        run: |
          import json, urllib.request, urllib.parse, time
          
          AUTHORS = [
              {"name": "جابر_جعفی", "query": "جابر بن يزيد الجعفي"},
              {"name": "فضل_شاذان", "query": "فضل بن شاذان النيسابوري"},
              {"name": "قطب_راوندی", "query": "قطب الدين الراوندي"},
              {"name": "سید_محمد_مجاهد", "query": "السيد محمد المجاهد الطباطبائي"},
              {"name": "مامقانی", "query": "عبد الله المامقاني"},
              {"name": "شوشتری", "query": "محمد تقي التستري"},
              {"name": "بهجة", "query": "محمد تقي بهجت"},
              {"name": "حسن_سلیمان_حلی", "query": "الحسن بن سليمان الحلي"},
              {"name": "فخر_المحققین", "query": "فخر المحققين الحلي"},
              {"name": "رضی_الدین_طاووس", "query": "رضي الدين علي بن طاووس"},
              {"name": "یحیی_سعید_حلی", "query": "يحيى بن سعيد الحلي"},
              {"name": "خامنه_ای", "query": "علي الحسيني الخامنئي"},
          ]
          
          results = {}
          
          for author in AUTHORS:
              name = author['name']
              query = author['query']
              
              print(f"\n🔍 جستجوی: {name}")
              print(f"   عبارت: {query}")
              
              try:
                  # جستجو در archive.org
                  url = f"https://archive.org/advancedsearch.php?q={urllib.parse.quote(query)}+AND+mediatype:texts&fl[]=identifier,title,creator,year&output=json&rows=10"
                  
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  response = urllib.request.urlopen(req, timeout=30)
                  data = json.loads(response.read())
                  
                  docs = data.get('response', {}).get('docs', [])
                  
                  author_results = []
                  for doc in docs[:10]:
                      author_results.append({
                          "title": doc.get('title', 'N/A'),
                          "creator": doc.get('creator', 'N/A'),
                          "year": doc.get('year', 'N/A'),
                          "identifier": doc.get('identifier', 'N/A'),
                          "url": f"https://archive.org/details/{doc.get('identifier', '')}"
                      })
                      print(f"   📚 {doc.get('title', 'N/A')[:80]}")
                      print(f"      {doc.get('identifier', 'N/A')}")
                  
                  results[name] = {
                      "query": query,
                      "total_found": data.get('response', {}).get('numFound', 0),
                      "books": author_results
                  }
                  
                  print(f"   📊 تعداد: {len(author_results)}")
                  
              except Exception as e:
                  print(f"   ❌ خطا: {e}")
                  results[name] = {"error": str(e)}
              
              time.sleep(1)  # احترام به سرور
          
          with open("archive_results.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*70}")
          print("📊 جمع‌بندی:")
          for name, data in results.items():
              if 'error' in data:
                  print(f"   ❌ {name}: خطا")
              else:
                  print(f"   {name}: {data['total_found']} نتیجه")
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: archive-search-results
          path: archive_results.json
          retention-days: 7
