name: SCAN - 16 Maliki Authors

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: SCAN ALL 16
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "امام_مالک", "patterns": ["MalikIbnAnas", "مالك", "Muwatta", "موطأ", "MalikAnas"]},
              {"name": "ابن_قاسم", "patterns": ["IbnQasim", "ابن_قاسم", "CabdRahmanQasim", "Mudawwana", "مدونه"]},
              {"name": "سحنون", "patterns": ["Sahnun", "سحنون", "Tanukhi", "تنوخي"]},
              {"name": "ابن_ابی_زید", "patterns": ["IbnAbiZayd", "ابن_ابي_زید", "Qayrawani", "قیرواني", "Risala"]},
              {"name": "ابن_رشد_جد", "patterns": ["IbnRushdJadd", "ابن_رشد", "RushdJadd", "BayanTahsil", "مقدمات"]},
              {"name": "ابن_رشد_حفید", "patterns": ["IbnRushdHafid", "RushdHafid", "BidayatMujtahid", "بدایه_مجتهد"]},
              {"name": "قرطبی", "patterns": ["Qurtubi", "قرطبي", "TafsirQurtubi", "تفسیر_قرطبي"]},
              {"name": "ابن_حاجب", "patterns": ["IbnHajib", "حاجب", "MukhtasarIbnHajib", "مختصر_حاجب"]},
              {"name": "قرافی", "patterns": ["Qarafi", "قرافي", "ShihabDinQarafi", "Furuq", "فروق", "Dhakira"]},
              {"name": "ابن_عرفه", "patterns": ["IbnCarafa", "عرفه", "MukhtasarIbnCarafa"]},
              {"name": "خلیل_اسحاق", "patterns": ["KhalilIbnIshaq", "خلیل", "MukhtasarKhalil", "مختصر_خلیل"]},
              {"name": "ابن_ابی_حجله", "patterns": ["IbnAbiHajala", "حجله", "Diwan"]},
              {"name": "میاره", "patterns": ["Mayyara", "میاره", "SharhMayyara", "شرح_میاره"]},
              {"name": "دردیر", "patterns": ["Dardir", "دردیر", "SharhSaghir", "شرح_صغیر"]},
              {"name": "صاوی", "patterns": ["Sawi", "صاوي", "HashiyaSawi", "حاشیه_صاوي"]},
              {"name": "زرقانی", "patterns": ["Zarqani", "زرقاني", "SharhMuwatta", "شرح_موطأ"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(100, 1400, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              found_real = [i for i in items if i['size_mb'] > 0.5]
              print(f"\n{author['name']}: {len(items)} پوشه ({len(found_real)} قابل قبول)")
              for item in items:
                  mark = "✅" if item['size_mb'] > 0.5 else "⚠️"
                  print(f"   {mark} {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("scan_maliki.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-maliki-results
          path: scan_maliki.json
          retention-days: 7
