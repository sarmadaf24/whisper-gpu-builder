name: SCAN - 18 Shafii Authors

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: SCAN ALL 18
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "امام_شافعی", "patterns": ["Shafici", "شافعي", "Shafii", "ام", "Umm", "رساله", "Risala"]},
              {"name": "مزنی", "patterns": ["Muzani", "مزني", "MukhtasarMuzani", "مختصر_مزني"]},
              {"name": "ابواسحاق_شیرازی", "patterns": ["AbuIshaqShirazi", "شیرازي", "Muhadhdhab", "مهذب", "Tanbih", "تنبیه"]},
              {"name": "غزالی", "patterns": ["Ghazali", "غزالي", "Ihya", "احیاء", "Mustasfa", "مستصفی"]},
              {"name": "رافعی", "patterns": ["Rafici", "رافعي", "SharhKabir", "شرح_کبیر", "FathAziz"]},
              {"name": "نووی", "patterns": ["Nawawi", "نووي", "Majmuc", "مجموع", "Minhaj", "منهاج", "RiyadSalihin"]},
              {"name": "ابن_دقیق", "patterns": ["IbnDaqiq", "دقیق", "Ihkam", "احکام", "Cidda"]},
              {"name": "تقی_سبکی", "patterns": ["TaqiDinSubki", "تقي_سبکي", "FatawaSubki", "فتاوی"]},
              {"name": "تاج_سبکی", "patterns": ["TajDinSubki", "تاج_سبکي", "TabaqatShaficiyya", "طبقات"]},
              {"name": "زرکشی", "patterns": ["Zarkashi", "زرکشي", "Burhan", "برهان", "BahrMuhit", "بحر_محیط"]},
              {"name": "ابن_حجر_هیتمی", "patterns": ["IbnHajarHaytami", "هیتمي", "TuhfaMuhtaj", "تحفه_محتاج", "Zawajir"]},
              {"name": "خطیب_شربینی", "patterns": ["KhatibShirbini", "شربیني", "MughniMuhtaj", "مغني_محتاج"]},
              {"name": "رملی", "patterns": ["Ramli", "رملي", "ShamsDinRamli", "NihayaMuhtaj", "نهایه_محتاج"]},
              {"name": "جلال_محلی", "patterns": ["JalalMahalli", "محلي", "TafsirJalalayn", "کنز_راغبین"]},
              {"name": "بجیرمی", "patterns": ["Bujayrami", "بجیرمي", "HashiyaBujayrami", "حاشیه"]},
              {"name": "ابن_ملقن", "patterns": ["IbnMulaqqin", "ملقن", "Tadhkira", "تذکره"]},
              {"name": "علائی", "patterns": ["Calai", "علائي", "SalahDinCalai", "قواعد"]},
              {"name": "ابن_کثیر", "patterns": ["IbnKathir", "کثیر", "كثير", "Bidaya", "بدایه", "TafsirIbnKathir"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(100, 1400, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              found_real = [i for i in items if i['size_mb'] > 0.5]
              print(f"\n{author['name']}: {len(items)} پوشه ({len(found_real)} قابل قبول)")
              for item in items:
                  mark = "✅" if item['size_mb'] > 0.5 else "⚠️"
                  print(f"   {mark} {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("scan_shafii.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-shafii-results
          path: scan_shafii.json
          retention-days: 7
