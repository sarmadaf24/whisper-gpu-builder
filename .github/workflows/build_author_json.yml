name: SCAN & EXTRACT - 23 Other Sunni

on:
  workflow_dispatch:

jobs:
  extract-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup Python & Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: SCAN & EXTRACT ALL 23
        shell: python
        run: |
          import os, json, subprocess, re
          
          AUTHORS = [
              {"name": "طبری", "patterns": ["Tabari", "طبري", "JamicBayan", "جامع_بیان", "TarikhTabari", "تاریخ_طبري"], "title_ar": "محمد بن جرير الطبري"},
              {"name": "ابن_ابی_حاتم", "patterns": ["IbnAbiHatim", "ابن_ابي_حاتم", "JarhTacdil", "جرح_تعدیل", "TafsirIbnAbiHatim"], "title_ar": "ابن أبي حاتم الرازي"},
              {"name": "ابن_حبان", "patterns": ["IbnHibban", "حبان", "SahihIbnHibban", "صحیح_حبان", "Thiqat", "ثقات"], "title_ar": "ابن حبان البستي"},
              {"name": "حاکم_نیشابوری", "patterns": ["HakimNaysaburi", "حاکم_نیشابوري", "Mustadrak", "مستدرك", "HakimNishapuri"], "title_ar": "الحاكم النيسابوري"},
              {"name": "ابن_عبدالبر", "patterns": ["IbnCabdBarr", "عبدالبر", "IstiCab", "استیعاب", "Tamhid", "تمهید"], "title_ar": "ابن عبد البر"},
              {"name": "خطیب_بغدادی", "patterns": ["KhatibBaghdadi", "خطیب_بغدادي", "TarikhBaghdad", "تاریخ_بغداد", "Kifaya"], "title_ar": "الخطيب البغدادي"},
              {"name": "بغوی", "patterns": ["Baghawi", "بغوي", "SharhSunna", "شرح_سنه", "Masabih", "مصابیح", "TafsirBaghawi"], "title_ar": "الحسين بن مسعود البغوي"},
              {"name": "ابن_عساکر", "patterns": ["IbnCasakir", "عساكر", "TarikhDimashq", "تاریخ_دمشق", "IbnAsakir"], "title_ar": "ابن عساكر الدمشقي"},
              {"name": "ابن_اثیر", "patterns": ["IbnAthir", "اثیر", "KamilFiTarikh", "کامل_تاریخ", "UsdGhaba", "اسد_غابه", "NihayaFiGharib"], "title_ar": "ابن الأثير الجزري"},
              {"name": "ابن_صلاح", "patterns": ["IbnSalah", "صلاح", "CulumHadith", "علوم_حدیث", "MuqaddimaIbnSalah"], "title_ar": "ابن الصلاح"},
              {"name": "منذری", "patterns": ["Mundhiri", "منذري", "TarghibTarhib", "ترغیب_ترهیب", "MukhtasarMuslim"], "title_ar": "عبد العظيم المنذري"},
              {"name": "ذهبی", "patterns": ["Dhahabi", "ذهبي", "SiyarAclam", "سیر_اعلام", "TarikhIslam", "میزان_اعتدال"], "title_ar": "شمس الدين الذهبي"},
              {"name": "ابن_کثیر", "patterns": ["IbnKathir", "کثیر", "Bidaya", "بدایه", "TafsirIbnKathir"], "title_ar": "ابن كثير الدمشقي"},
              {"name": "ابن_حجر", "patterns": ["IbnHajar", "حجر", "FathBari", "فتح_باري", "Tahdhib", "Isaba", "اصابه"], "title_ar": "ابن حجر العسقلاني"},
              {"name": "سیوطی", "patterns": ["Suyuti", "سیوطي", "Itqan", "اتقان", "DurrManthur", "در_منثور", "JamicSaghir"], "title_ar": "جلال الدين السيوطي"},
              {"name": "سخاوی", "patterns": ["Sakhawi", "سخاوي", "DawLamic", "ضو_لامع", "FathMughith"], "title_ar": "شمس الدين السخاوي"},
              {"name": "شوکانی", "patterns": ["Shawkani", "شوكاني", "NaylAwtar", "نیل_اوطار", "FathQadir", "فتح_قدیر"], "title_ar": "محمد بن علي الشوكاني"},
              {"name": "خطیب_تبریزی", "patterns": ["KhatibTabrizi", "تبریزي", "MishkatMasabih", "مشکاه_مصابیح", "Ikmac"], "title_ar": "الخطيب التبريزي"},
              {"name": "جوهری", "patterns": ["Jawhari", "جوهري", "Sihah", "صحاح", "TajLugha"], "title_ar": "إسماعيل الجوهري"},
              {"name": "ابن_قتیبه", "patterns": ["IbnQutayba", "قتیبه", "CuyunAkhbar", "عیون_اخبار", "Macarif", "معارف", "Shicr"], "title_ar": "ابن قتيبة الدينوري"},
              {"name": "زمخشری", "patterns": ["Zamakhshari", "زمخشري", "Kashshaf", "کشاف", "Mufassal", "مفصل", "AsasBalagha"], "title_ar": "محمود الزمخشري"},
              {"name": "صغانی", "patterns": ["Saghani", "صغاني", "MashariqAnwar", "مشارق_انوار", "Cubab", "عباب"], "title_ar": "الحسن الصغاني"},
              {"name": "جرجانی", "patterns": ["Jurjani", "جرجاني", "Tacrifat", "تعریفات", "SharifJurjani", "شریف_جرجاني"], "title_ar": "علي بن محمد الجرجاني"},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(200, 1400, 25)]
          cloned_repos = {}
          FINAL_DIR = "final_package"
          os.makedirs(FINAL_DIR, exist_ok=True)
          
          def clean_text(raw_text):
              lines = raw_text.split('\n')
              clean_lines = []
              for line in lines:
                  if re.match(r'^#META#', line.strip()): continue
                  if line.strip() == '#META#Header#End#': continue
                  if re.match(r'^PageV', line.strip()): continue
                  if re.match(r'^ms\d+$', line.strip()): continue
                  if '~~' in line: line = line.replace('~~', '')
                  if line.startswith('### |') or line.startswith('### ||'): continue
                  if line.startswith('# '): line = line[2:]
                  elif line.startswith('## '): line = line[3:]
                  elif line.startswith('### '): line = line[4:]
                  clean_lines.append(line)
              
              result = []
              prev_empty = False
              for line in clean_lines:
                  is_empty = not line.strip()
                  if is_empty and prev_empty: continue
                  result.append(line)
                  prev_empty = is_empty
              return '\n'.join(result).strip()
          
          # مرحله ۱: اسکن
          print("🔍 مرحله ۱: اسکن...")
          author_folders = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_dir = f"repo_{repo_name}"
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo_name}.git", repo_dir], capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk(folder_path) for f in fs)
                              if folder not in [f["folder"] for f in author_folders[author["name"]]]:
                                  author_folders[author["name"]].append({"repo": repo_name, "folder": folder, "size_mb": round(total_size/(1024*1024),2)})
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          # انتخاب بهترین پوشه
          FINAL_AUTHORS = []
          for author in AUTHORS:
              items = author_folders[author["name"]]
              best = max(items, key=lambda x: x['size_mb']) if items else None
              if best and best['size_mb'] > 0.5:
                  FINAL_AUTHORS.append({"name": author['name'], "folder": best['folder'], "repo": best['repo'], "title_ar": author['title_ar']})
                  print(f"   ✅ {author['name']}: {best['folder']} ({best['size_mb']} MB)")
              else:
                  print(f"   ❌ {author['name']}: پیدا نشد")
          
          # مرحله ۲: استخراج
          print(f"\n📚 مرحله ۲: استخراج {len(FINAL_AUTHORS)} نویسنده...")
          ALL_SUMMARY = []
          
          for idx, author in enumerate(FINAL_AUTHORS, 1):
              author_name = author['name']
              folder_name = author['folder']
              repo_name = author['repo']
              title_ar = author['title_ar']
              
              print(f"\n{'#'*70}")
              print(f"📚 [{idx}/{len(FINAL_AUTHORS)}] {title_ar}")
              
              author_dir = os.path.join(FINAL_DIR, author_name)
              os.makedirs(author_dir, exist_ok=True)
              
              if repo_name not in cloned_repos:
                  repo_dir = f"repo_{repo_name}"
                  if not os.path.exists(repo_dir):
                      subprocess.run(["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo_name}.git", repo_dir], check=True, capture_output=True)
                  cloned_repos[repo_name] = repo_dir
              
              folder_path = os.path.join(cloned_repos[repo_name], "data", folder_name)
              books_extracted = []
              
              for root, dirs, files in os.walk(folder_path):
                  for file in sorted(files):
                      file_path = os.path.join(root, file)
                      try: size = os.path.getsize(file_path)
                      except: continue
                      if size < 50000: continue
                      if file.endswith(('.yml', '.md')): continue
                      
                      try:
                          with open(file_path, 'r', encoding='utf-8') as f:
                              raw_text = f.read()
                      except: continue
                      
                      meta = {}
                      for key, pattern in {
                          'title': r'#META#\s+020\.BookTITLE\s+::\s+(.+)',
                          'author': r'#META#\s+010\.AuthorNAME\s+::\s+(.+)',
                      }.items():
                          m = re.search(pattern, raw_text)
                          if m and m.group(1).strip() not in ['NODATA', 'NOTGIVEN', '']:
                              meta[key] = m.group(1).strip()
                      
                      title = meta.get('title', file[:60])
                      clean = clean_text(raw_text)
                      
                      safe_name = re.sub(r'[^\w\-_]', '_', title)[:60]
                      txt_path = os.path.join(author_dir, f"{safe_name}.txt")
                      
                      with open(txt_path, 'w', encoding='utf-8') as f:
                          f.write(f"العنوان: {title}\n")
                          if 'author' in meta: f.write(f"المؤلف: {meta['author']}\n")
                          f.write("="*70 + "\n\n")
                          f.write(clean)
                      
                      books_extracted.append({"title": title, "size_mb": round(size/(1024*1024),2), "text_length": len(clean)})
                      print(f"   ✅ {title} ({round(size/(1024*1024),1)} MB)")
              
              with open(os.path.join(author_dir, "metadata.json"), 'w', encoding='utf-8') as f:
                  json.dump({"author": title_ar, "total_books": len(books_extracted), "books": books_extracted}, f, ensure_ascii=False, indent=2)
              ALL_SUMMARY.append({"author": title_ar, "total_books": len(books_extracted)})
          
          with open(os.path.join(FINAL_DIR, "00_INDEX.json"), 'w', encoding='utf-8') as f:
              json.dump({"total_authors": len(ALL_SUMMARY), "authors": ALL_SUMMARY}, f, ensure_ascii=False, indent=2)
          
          print(f"\n🎉 تمام! {len(ALL_SUMMARY)} نویسنده پردازش شد")
      
      - name: Upload Final Package
        uses: actions/upload-artifact@v4
        with:
          name: ALL-23-OTHER-SUNNI-FINAL
          path: final_package/
          retention-days: 7
          compression-level: 6
