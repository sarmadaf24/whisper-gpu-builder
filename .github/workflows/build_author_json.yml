name: Build Author JSON - Dhahabi Complete

on:
  workflow_dispatch:

jobs:
  build-dhahabi:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: 🔍 جستجوی جامع با الگوهای فارسی و عربی
        shell: python
        run: |
          import os
          import subprocess
          import json
          
          # الگوهای جستجو به فارسی، عربی و انگلیسی
          SEARCH_PATTERNS = [
              "dhahabi",
              "Dhahabi",
              "ذَهَبي",  
              "ذهبي",
              "الذهبي",
              "الذَهَبي",
              "ShamsDin",
              "شمس الدين",
              "شمسالدين"
          ]
          
          DEATH_YEAR = 748
          
          # مخازن بیشتری رو بررسی می‌کنیم
          possible_repos = [
              "0650AH", "0675AH", "0700AH", "0725AH", 
              "0750AH", "0775AH", "0800AH", "0825AH"
          ]
          
          found_folders = {}
          
          for repo_name in possible_repos:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = f"repo_{repo_name}"
              
              print(f"\n{'='*60}")
              print(f"🔍 بررسی مخزن {repo_name}...")
              print(f"{'='*60}")
              
              if not os.path.exists(target_dir):
                  result = subprocess.run(
                      ["git", "clone", "--depth", "1", "--single-branch", repo_url, target_dir],
                      capture_output=True,
                      text=True
                  )
                  if result.returncode != 0:
                      print(f"⚠️ خطا در کلون {repo_name}")
                      continue
              
              data_dir = os.path.join(target_dir, "data")
              if not os.path.exists(data_dir):
                  print(f"⚠️ دایرکتوری data یافت نشد")
                  continue
              
              # جستجو با همه الگوها
              for pattern in SEARCH_PATTERNS:
                  for folder in sorted(os.listdir(data_dir)):
                      if pattern.lower() in folder.lower():
                          if folder not in found_folders:
                              found_folders[folder] = {
                                  "repo": repo_name,
                                  "path": os.path.join(data_dir, folder),
                                  "matched_pattern": pattern
                              }
              
              # نمایش نتایج این مخزن
              repo_matches = [f for f, v in found_folders.items() if v['repo'] == repo_name]
              if repo_matches:
                  print(f"✅ {len(repo_matches)} پوشه در {repo_name}:")
                  for m in repo_matches:
                      print(f"   📁 {m} (الگو: {found_folders[m]['matched_pattern']})")
              else:
                  print(f"❌ هیچ پوشه‌ای یافت نشد")
                  # حذف مخازن بدون نتیجه
                  subprocess.run(["rm", "-rf", target_dir], check=True)
          
          # ذخیره نتایج
          with open("search_results.json", "w", encoding="utf-8") as f:
              json.dump(found_folders, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*60}")
          print(f"🎯 جمع‌بندی نهایی: {len(found_folders)} پوشه منحصربه‌فرد")
          print(f"{'='*60}")
          
          for i, (folder, info) in enumerate(sorted(found_folders.items()), 1):
              print(f"{i}. {folder} [{info['repo']}]")
      
      - name: 📚 استخراج و ذخیره‌سازی هر کتاب
        shell: python
        run: |
          import os
          import json
          import yaml
          import sys
          
          if not os.path.exists("search_results.json"):
              print("❌ search_results.json یافت نشد!")
              sys.exit(1)
          
          with open("search_results.json", "r", encoding="utf-8") as f:
              found_folders = json.load(f)
          
          if not found_folders:
              print("❌ هیچ کتابی یافت نشد!")
              sys.exit(0)
          
          def parse_metadata(readme_path):
              try:
                  with open(readme_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if content.startswith('---'):
                      parts = content.split('---')
                      if len(parts) >= 3:
                          return yaml.safe_load(parts[1])
                  return {}
              except:
                  return {}
          
          def extract_text(book_folder):
              texts = []
              for root, _, files in os.walk(book_folder):
                  for file in sorted(files):
                      if file == 'README.md':
                          continue
                      if file.endswith(('.mARkdown', '.txt', '.md')):
                          try:
                              with open(os.path.join(root, file), 'r', encoding='utf-8') as f:
                                  content = f.read()
                                  if content.strip():
                                      texts.append(content)
                          except:
                              pass
              return "\n\n".join(texts)
          
          # ایجاد پوشه برای خروجی‌ها
          os.makedirs("output_books", exist_ok=True)
          os.makedirs("output_metadata", exist_ok=True)
          
          all_metadata = []
          
          print(f"\n{'='*60}")
          print(f"📚 استخراج {len(found_folders)} کتاب...")
          print(f"{'='*60}\n")
          
          for i, (folder_name, info) in enumerate(sorted(found_folders.items()), 1):
              folder_path = info['path']
              
              print(f"📖 [{i}/{len(found_folders)}] {folder_name}")
              
              readme = os.path.join(folder_path, 'README.md')
              metadata = {}
              if os.path.exists(readme):
                  metadata = parse_metadata(readme)
              
              title = metadata.get('title') or metadata.get('Title') or folder_name
              text = extract_text(folder_path)
              
              # ذخیره متن کتاب در فایل جداگانه
              safe_title = title.replace('/', '_').replace(' ', '_')[:100]
              text_filename = f"output_books/{i:03d}_{safe_title}.txt"
              
              with open(text_filename, 'w', encoding='utf-8') as f:
                  f.write(f"عنوان: {title}\n")
                  f.write(f"پوشه: {folder_name}\n")
                  f.write(f"مخزن: {info['repo']}\n")
                  f.write("=" * 80 + "\n\n")
                  f.write(text)
              
              # ذخیره متادیتا
              book_meta = {
                  "index": i,
                  "folder_name": folder_name,
                  "title": title,
                  "repo": info['repo'],
                  "matched_pattern": info['matched_pattern'],
                  "metadata": metadata,
                  "text_length": len(text),
                  "text_file": text_filename,
                  "text_preview": text[:500] + "..." if len(text) > 500 else text
              }
              
              all_metadata.append(book_meta)
              
              print(f"   ✅ {title}")
              print(f"   📝 {len(text):,} chars")
              print(f"   💾 ذخیره در: {text_filename}")
              print()
          
          # ذخیره ایندکس کلی
          index_data = {
              "author_name": "شمس الدین ذهبی",
              "death_year": 748,
              "total_books": len(all_metadata),
              "books": all_metadata
          }
          
          with open("output_metadata/index.json", "w", encoding="utf-8") as f:
              json.dump(index_data, f, ensure_ascii=False, indent=2)
          
          # خلاصه برای دانلود آسان
          summary = []
          for book in all_metadata:
              summary.append({
                  "title": book['title'],
                  "text_length": book['text_length'],
                  "file": book['text_file']
              })
          
          with open("output_metadata/summary.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*60}")
          print(f"✅ استخراج کامل شد!")
          print(f"   📚 کتاب‌ها: {len(all_metadata)}")
          print(f"   📁 فایل‌های متنی در: output_books/")
          print(f"   📋 ایندکس در: output_metadata/index.json")
          print(f"{'='*60}")
      
      - name: 📊 نمایش خلاصه نهایی
        run: |
          echo "=== خلاصه آثار ذهبی ==="
          echo ""
          
          if [ -f "output_metadata/summary.json" ]; then
              python3 -c "
          import json
          with open('output_metadata/summary.json', 'r', encoding='utf-8') as f:
              summary = json.load(f)
          print(f'مجموع: {len(summary)} کتاب')
          print()
          for i, book in enumerate(summary, 1):
              print(f'{i}. {book[\"title\"]}')
              print(f'   📏 حجم: {book[\"text_length\"]:,} chars')
              print(f'   📄 فایل: {book[\"file\"]}')
              print()
              if i >= 10:
                  print(f'... و {len(summary)-10} کتاب دیگر')
                  break
              "
          else
              echo "❌ فایل summary.json یافت نشد!"
          fi
          
          echo ""
          echo "=== حجم فایل‌های خروجی ==="
          du -sh output_books/ output_metadata/ 2>/dev/null || echo "پوشه‌ها خالی هستند"
      
      - name: 📤 آپلود همه خروجی‌ها
        uses: actions/upload-artifact@v4
        with:
          name: dhahabi-all-works
          path: |
            output_books/
            output_metadata/
          retention-days: 90
          compression-level: 6
      
      - name: 📤 آپلود ایندکس جداگانه
        uses: actions/upload-artifact@v4
        with:
          name: dhahabi-index
          path: output_metadata/index.json
          retention-days: 90
