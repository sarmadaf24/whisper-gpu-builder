name: Build Author JSON - Dhahabi

on:
  workflow_dispatch:

jobs:
  build-dhahabi:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: 🔍 جستجوی ذهبی در تمام مخازن OpenITI
        shell: python
        run: |
          import os
          import subprocess
          import json
          
          AUTHOR_SEARCH = "dhahabi"
          DEATH_YEAR = 748
          
          # محدوده مخازن برای جستجو (حدس می‌زنیم بین 0700 تا 0800)
          possible_repos = [
              "0700AH", "0725AH", "0750AH", "0775AH", "0800AH"
          ]
          
          found_folders = []
          
          for repo_name in possible_repos:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = f"repo_{repo_name}"
              
              print(f"\n{'='*60}")
              print(f"🔍 بررسی مخزن {repo_name}...")
              print(f"{'='*60}")
              
              # کلون کم‌عمق (فقط آخرین نسخه)
              if not os.path.exists(target_dir):
                  result = subprocess.run(
                      ["git", "clone", "--depth", "1", repo_url, target_dir],
                      capture_output=True,
                      text=True
                  )
                  if result.returncode != 0:
                      print(f"⚠️ خطا در کلون {repo_name}، رد می‌شود...")
                      continue
              
              data_dir = os.path.join(target_dir, "data")
              if not os.path.exists(data_dir):
                  print(f"⚠️ دایرکتوری data در {repo_name} یافت نشد")
                  continue
              
              # جستجوی پوشه‌های مرتبط
              matches = []
              for folder in sorted(os.listdir(data_dir)):
                  if AUTHOR_SEARCH.lower() in folder.lower():
                      matches.append(folder)
              
              if matches:
                  print(f"✅ {len(matches)} پوشه در {repo_name} یافت شد:")
                  for m in matches:
                      print(f"   📁 {m}")
                      found_folders.append({
                          "repo": repo_name,
                          "folder": m,
                          "path": os.path.join(data_dir, m)
                      })
              else:
                  print(f"❌ هیچ پوشه‌ای در {repo_name} یافت نشد")
              
              # حذف مخزن برای صرفه‌جویی در فضا (به جز مخزنی که پوشه دارد)
              if not matches:
                  subprocess.run(["rm", "-rf", target_dir], check=True)
          
          # ذخیره نتایج جستجو
          with open("search_results.json", "w", encoding="utf-8") as f:
              json.dump(found_folders, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*60}")
          print(f"🎯 جمع‌بندی: {len(found_folders)} پوشه برای ذهبی یافت شد")
          print(f"{'='*60}")
          
          if found_folders:
              print("\n📚 لیست نهایی:")
              for i, item in enumerate(found_folders, 1):
                  print(f"{i}. [{item['repo']}] {item['folder']}")
      
      - name: 🔨 استخراج متون ذهبی
        shell: python
        run: |
          import os
          import json
          import yaml
          import sys
          
          # خواندن نتایج جستجو
          if not os.path.exists("search_results.json"):
              print("❌ فایل search_results.json یافت نشد!")
              sys.exit(1)
          
          with open("search_results.json", "r", encoding="utf-8") as f:
              found_folders = json.load(f)
          
          if not found_folders:
              print("❌ هیچ کتابی برای ذهبی یافت نشد!")
              # ایجاد فایل خالی
              data = {
                  "author_name": "شمس الدین ذهبی",
                  "death_year": 748,
                  "source": "OpenITI",
                  "total_books": 0,
                  "books": []
              }
              with open("dhahabi.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              sys.exit(0)
          
          def parse_metadata(readme_path):
              try:
                  with open(readme_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  if content.startswith('---'):
                      parts = content.split('---')
                      if len(parts) >= 3:
                          return yaml.safe_load(parts[1])
                  return {}
              except:
                  return {}
          
          def extract_text(book_folder):
              texts = []
              for root, _, files in os.walk(book_folder):
                  for file in sorted(files):
                      if file == 'README.md':
                          continue
                      if file.endswith(('.mARkdown', '.txt', '.md')):
                          try:
                              with open(os.path.join(root, file), 'r', encoding='utf-8') as f:
                                  content = f.read()
                                  if content.strip():
                                      texts.append(content)
                          except:
                              pass
              return "\n\n".join(texts)
          
          print(f"\n{'='*60}")
          print(f"📚 شروع استخراج {len(found_folders)} کتاب...")
          print(f"{'='*60}\n")
          
          all_books = []
          
          for i, item in enumerate(found_folders, 1):
              folder_path = item['path']
              folder_name = item['folder']
              
              print(f"📖 [{i}/{len(found_folders)}] {folder_name}")
              
              readme = os.path.join(folder_path, 'README.md')
              metadata = {}
              if os.path.exists(readme):
                  metadata = parse_metadata(readme)
              
              title = metadata.get('title') or metadata.get('Title') or folder_name
              text = extract_text(folder_path)
              
              all_books.append({
                  "folder_name": folder_name,
                  "title": title,
                  "repo": item['repo'],
                  "metadata": metadata,
                  "text_length": len(text),
                  "text": text
              })
              
              print(f"   ✅ {title}")
              print(f"   📝 {len(text):,} chars")
              print(f"   📦 مخزن: {item['repo']}")
          
          # ساخت JSON نهایی
          data = {
              "author_name": "شمس الدین ذهبی",
              "death_year": 748,
              "source": "OpenITI",
              "total_books": len(all_books),
              "books": all_books
          }
          
          with open("dhahabi.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          size_mb = os.path.getsize("dhahabi.json") / (1024 * 1024)
          
          print(f"\n{'='*60}")
          print(f"✅ استخراج کامل شد!")
          print(f"   📚 کتاب‌ها: {len(all_books)}")
          print(f"   💾 حجم: {size_mb:.2f} MB")
          print(f"{'='*60}")
      
      - name: 📊 نمایش خلاصه
        run: |
          echo "=== اطلاعات فایل ==="
          ls -lh dhahabi.json
          echo ""
          echo "=== فهرست کتاب‌های استخراج شده ==="
          python3 -c "
          import json
          with open('dhahabi.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(f'مجموع: {data[\"total_books\"]} کتاب')
          print()
          for i, b in enumerate(data['books'], 1):
              print(f'{i}. {b[\"title\"]}')
              print(f'   📏 حجم متن: {b[\"text_length\"]:,} chars')
              print(f'   📦 مخزن: {b.get(\"repo\", \"N/A\")}')
              print(f'   📁 پوشه: {b[\"folder_name\"]}')
              print()
          "
      
      - name: 📤 آپلود فایل JSON نهایی
        uses: actions/upload-artifact@v4
        with:
          name: dhahabi-complete-works
          path: dhahabi.json
          retention-days: 90
          compression-level: 6
