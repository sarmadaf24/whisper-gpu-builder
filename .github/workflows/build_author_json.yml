name: FINAL DEEP SCAN & EXTRACT - 38 Authors

on:
  workflow_dispatch:

jobs:
  extract-all:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: Setup Python & Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: DEEP SCAN & EXTRACT ALL 38
        shell: python
        run: |
          import os, json, subprocess, re
          
          AUTHORS = [
              # ۹ گمشده قبلی
              {"name": "ظهیرالدین_بخاری", "patterns": ["ZahirDinBukhari", "ظهیر_بخاری", "ZahirBukhari", "فتاوی_ظهیریه", "Zahiriyya", "ظهیریه", "ZahirDinMuhammadBukhari", "فتاوی", "Fatawa"], "title_ar": "ظهير الدين البخاري"},
              {"name": "والوالجی", "patterns": ["Walwaliji", "والوالجي", "Walwalij", "فتاوی_والوالجیه", "Walwalijiyya", "ZahirDinWalwaliji"], "title_ar": "عبد الرشيد الوالوالجي"},
              {"name": "خوارزمی_ادیب", "patterns": ["Khawarizmi", "خوارزمي", "Khwarizmi", "MafatihCulum", "مفاتیح_علوم", "AbuBakrKhawarizmi", "ابوبکر_خوارزمي"], "title_ar": "أبو بكر الخوارزمي الأديب"},
              {"name": "جلال_محلی", "patterns": ["JalalMahalli", "محلي", "Mahalli", "TafsirJalalayn", "کنز_راغبین", "KanzRaghibin", "JalalDinMahalli"], "title_ar": "جلال الدين المحلي"},
              {"name": "بجیرمی", "patterns": ["Bujayrami", "بجیرمي", "Bujayrimi", "HashiyaBujayrami", "حاشیه_بجیرمي", "SulaymanBujayrami"], "title_ar": "سليمان البجيرمي"},
              {"name": "ابن_قاسم_مالکی", "patterns": ["IbnQasim", "ابن_قاسم", "CabdRahmanQasim", "Mudawwana", "مدونه", "QasimMisri", "IbnQasimMaliki"], "title_ar": "عبد الرحمن بن القاسم المالكي"},
              {"name": "زرقانی", "patterns": ["Zarqani", "زرقاني", "SharhMuwatta", "شرح_موطأ", "MuhammadZarqani", "ZarqaniMaliki"], "title_ar": "محمد الزرقاني المالكي"},
              {"name": "بربهاری", "patterns": ["Barbahari", "بربهاري", "SharhSunna", "شرح_سنه", "BarbahariHanbali", "AbuMuhammadBarbahari"], "title_ar": "أبو محمد البربهاري"},
              {"name": "شمس_قدامه", "patterns": ["ShamsDinIbnQudama", "شمس_قدامه", "SharhKabir", "شرح_کبیر", "CabdRahmanIbnQudama", "شمس_الدین_قدامه"], "title_ar": "شمس الدين ابن قدامة"},
              
              # ۹ حدیث و رجال
              {"name": "یاقوت_حموی", "patterns": ["YaqutHamawi", "یاقوت_حموي", "MucjamBuldan", "معجم_بلدان", "MucjamUdaba", "معجم_ادبا"], "title_ar": "ياقوت الحموي"},
              {"name": "ابن_خلکان", "patterns": ["IbnKhallikan", "خلکان", "WafayatAcyan", "وفیات_اعیان", "IbnKhallikan"], "title_ar": "ابن خلكان"},
              {"name": "ابن_جوزی", "patterns": ["IbnJawzi", "جوزي", "Muntazam", "منتظم", "TalbisIblis", "تلبيس_ابليس", "IbnJawziHanbali"], "title_ar": "ابن الجوزي"},
              {"name": "ابن_اثیر", "patterns": ["IbnAthir", "اثیر", "KamilFiTarikh", "کامل_تاریخ", "UsdGhaba", "اسد_غابه", "NihayaFiGharib"], "title_ar": "ابن الأثير"},
              {"name": "ذهبی", "patterns": ["Dhahabi", "ذهبي", "SiyarAclam", "سیر_اعلام", "TarikhIslam", "تاریخ_اسلام", "MizanIctidal"], "title_ar": "شمس الدين الذهبي"},
              {"name": "ابن_صلاح", "patterns": ["IbnSalah", "صلاح", "CulumHadith", "علوم_حدیث", "MuqaddimaIbnSalah", "مقدمه_صلاح", "IbnSalahShahrazuri"], "title_ar": "ابن الصلاح"},
              {"name": "خطیب_بغدادی", "patterns": ["KhatibBaghdadi", "خطیب_بغدادي", "TarikhBaghdad", "تاریخ_بغداد", "Kifaya", "کفایه"], "title_ar": "الخطيب البغدادي"},
              {"name": "ابن_حجر", "patterns": ["IbnHajar", "حجر", "FathBari", "فتح_باري", "Isaba", "اصابه", "TahdhibTahdhib"], "title_ar": "ابن حجر العسقلاني"},
              {"name": "ابن_عبدالبر", "patterns": ["IbnCabdBarr", "عبدالبر", "IstiCab", "استیعاب", "Tamhid", "تمهید", "JamicBayan"], "title_ar": "ابن عبد البر"},
              
              # ۷ فلسفه و کلام
              {"name": "فارابی", "patterns": ["Farabi", "فارابي", "AraAhlMadina", "مدینه_فاضله", "IhsaUlum", "احصاء_علوم", "FarabiTurk"], "title_ar": "أبو نصر الفارابي"},
              {"name": "ابن_سینا", "patterns": ["IbnSina", "سینا", "Avicenna", "Shifa", "شفا", "Isharat", "اشارات", "QanunFiTibb"], "title_ar": "ابن سينا"},
              {"name": "ابن_رشد_حفید", "patterns": ["IbnRushdHafid", "رشد_حفید", "BidayatMujtahid", "بدایه_مجتهد", "TahafutTahafut", "تهافت_تهافت"], "title_ar": "ابن رشد الحفيد"},
              {"name": "جوینی", "patterns": ["Juwayni", "جویني", "BurhanFiUsul", "برهان_اصول", "IrshadFiKalam", "ارشاد_کلام", "ImamHaramayn"], "title_ar": "إمام الحرمين الجويني"},
              {"name": "فخر_رازی", "patterns": ["FakhrDinRazi", "فخر_رازي", "MafatihGhayb", "مفاتیح_غیب", "MabahithMashriqiyya", "محصل", "Muhassal"], "title_ar": "فخر الدين الرازي"},
              {"name": "غزالی", "patterns": ["Ghazali", "غزالي", "IhyaUlum", "احیاء_علوم", "TahafutFalasifa", "تهافت_فلاسفه", "Mustasfa"], "title_ar": "أبو حامد الغزالي"},
              {"name": "ابن_حزم", "patterns": ["IbnHazm", "حزم", "FisalFiMilal", "فصل_ملل", "Muhalla", "محلی", "IbnHazmZahiri"], "title_ar": "ابن حزم الظاهري"},
              
              # ۳ عرفان و تصوف
              {"name": "ابن_عربی", "patterns": ["IbnCarabi", "عربي", "FususHikam", "فصوص_حکم", "FutuhatMakkiyya", "فتوحات_مکیه", "ShaykhAkbar"], "title_ar": "محيي الدين ابن عربي"},
              {"name": "مولانا_رومی", "patterns": ["JalalDinRumi", "رومي", "Mathnawi", "مثنوي", "FihiMaFihi", "فیه_ما_فیه", "MawlanaRumi"], "title_ar": "جلال الدين الرومي"},
              {"name": "عبدالقادر_گیلانی", "patterns": ["CabdQadirJilani", "گیلاني", "Jilani", "Ghunya", "غنیه", "FutuhGhayb", "فتوح_غیب"], "title_ar": "عبد القادر الجيلاني"},
              
              # ۵ ادبیات و لغت
              {"name": "جاحظ", "patterns": ["Jahiz", "جاحظ", "BayanTabyin", "بیان_تبیین", "Bukhala", "بخلاء", "Hayawan", "حیوان"], "title_ar": "الجاحظ"},
              {"name": "ابن_مقفع", "patterns": ["IbnMuqaffac", "مقفع", "KalilaWaDimna", "کلیله_دمنه", "AdabKabir", "ادب_کبیر"], "title_ar": "ابن المقفع"},
              {"name": "خلیل_فراهیدی", "patterns": ["KhalilFarahidi", "خلیل_فراهیدي", "Cayn", "عین", "KitabCayn", "AynLugha", "Farahidi"], "title_ar": "الخليل بن أحمد الفراهيدي"},
              {"name": "ابن_جنی", "patterns": ["IbnJinni", "جني", "Khasais", "خصائص", "SirrSinaca", "سر_صناعه", "IbnJinniNahwi"], "title_ar": "ابن جني النحوي"},
              {"name": "ابن_منظور", "patterns": ["IbnManzur", "منظور", "LisanCarab", "لسان_عرب", "IbnManzurMisri"], "title_ar": "ابن منظور"},
              
              # ۲ علوم اجتماعی
              {"name": "ابن_خلدون", "patterns": ["IbnKhaldun", "خلدون", "Muqaddima", "مقدمه", "Cibar", "عبر", "IbnKhaldun"], "title_ar": "ابن خلدون"},
              {"name": "ماوردی", "patterns": ["Mawardi", "ماوردي", "AhkamSultaniyya", "احکام_سلطانیه", "AdabDunyaWaDin", "ادب_دنیا_دین"], "title_ar": "الماوردي"},
              
              # ۳ علوم طبیعی
              {"name": "ابن_هیثم", "patterns": ["IbnHaytham", "هیثم", "Manazir", "مناظر", "IbnHaythamBasri", "Haytham"], "title_ar": "ابن الهيثم"},
              {"name": "جابر_بن_حیان", "patterns": ["JabirIbnHayyan", "جابر_حیان", "Sumum", "سموم", "JabirHayyan", "IbnHayyan"], "title_ar": "جابر بن حيان"},
              {"name": "خوارزمی_ریاضی", "patterns": ["MuhammadIbnMusa", "خوارزمي_ریاضي", "KhwarizmiMath", "JabrMuqabala", "جبر_مقابله", "KhwarizmiAlgebra"], "title_ar": "محمد بن موسى الخوارزمي"},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          cloned_repos = {}
          FINAL_DIR = "final_package"
          os.makedirs(FINAL_DIR, exist_ok=True)
          
          def clean_text(raw_text):
              lines = raw_text.split('\n')
              clean_lines = []
              for line in lines:
                  if re.match(r'^#META#', line.strip()): continue
                  if line.strip() == '#META#Header#End#': continue
                  if re.match(r'^PageV', line.strip()): continue
                  if re.match(r'^ms\d+$', line.strip()): continue
                  if '~~' in line: line = line.replace('~~', '')
                  if line.startswith('### |') or line.startswith('### ||'): continue
                  if line.startswith('# '): line = line[2:]
                  elif line.startswith('## '): line = line[3:]
                  elif line.startswith('### '): line = line[4:]
                  clean_lines.append(line)
              
              result = []
              prev_empty = False
              for line in clean_lines:
                  is_empty = not line.strip()
                  if is_empty and prev_empty: continue
                  result.append(line)
                  prev_empty = is_empty
              return '\n'.join(result).strip()
          
          # اسکن
          print("🔍 مرحله ۱: اسکن عمیق...")
          author_folders = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_dir = f"repo_{repo_name}"
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo_name}.git", repo_dir], capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk(folder_path) for f in fs)
                              if folder not in [f["folder"] for f in author_folders[author["name"]]]:
                                  author_folders[author["name"]].append({"repo": repo_name, "folder": folder, "size_mb": round(total_size/(1024*1024),2)})
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          # گزارش اسکن
          print(f"\n\n{'='*70}")
          print("📊 گزارش اسکن:")
          print(f"{'='*70}")
          
          FOUND_AUTHORS = []
          MISSING_AUTHORS = []
          
          for author in AUTHORS:
              items = author_folders[author["name"]]
              best = max(items, key=lambda x: x['size_mb']) if items else None
              if best and best['size_mb'] > 0.3:
                  print(f"   ✅ {author['name']}: {best['folder']} ({best['size_mb']} MB)")
                  FOUND_AUTHORS.append({"name": author['name'], "folder": best['folder'], "repo": best['repo'], "title_ar": author['title_ar']})
              else:
                  print(f"   ❌ {author['name']}: پیدا نشد")
                  MISSING_AUTHORS.append(author['title_ar'])
          
          # استخراج
          print(f"\n📚 مرحله ۲: استخراج {len(FOUND_AUTHORS)} نویسنده...")
          ALL_SUMMARY = []
          
          for idx, author in enumerate(FOUND_AUTHORS, 1):
              author_name = author['name']
              folder_name = author['folder']
              repo_name = author['repo']
              title_ar = author['title_ar']
              
              print(f"\n{'#'*70}")
              print(f"📚 [{idx}/{len(FOUND_AUTHORS)}] {title_ar}")
              
              author_dir = os.path.join(FINAL_DIR, author_name)
              os.makedirs(author_dir, exist_ok=True)
              
              if repo_name not in cloned_repos:
                  repo_dir = f"repo_{repo_name}"
                  if not os.path.exists(repo_dir):
                      subprocess.run(["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo_name}.git", repo_dir], check=True, capture_output=True)
                  cloned_repos[repo_name] = repo_dir
              
              folder_path = os.path.join(cloned_repos[repo_name], "data", folder_name)
              books_extracted = []
              
              for root, dirs, files in os.walk(folder_path):
                  for file in sorted(files):
                      file_path = os.path.join(root, file)
                      try: size = os.path.getsize(file_path)
                      except: continue
                      if size < 50000: continue
                      if file.endswith(('.yml', '.md')): continue
                      
                      try:
                          with open(file_path, 'r', encoding='utf-8') as f:
                              raw_text = f.read()
                      except: continue
                      
                      meta = {}
                      for key, pattern in {
                          'title': r'#META#\s+020\.BookTITLE\s+::\s+(.+)',
                          'author': r'#META#\s+010\.AuthorNAME\s+::\s+(.+)',
                      }.items():
                          m = re.search(pattern, raw_text)
                          if m and m.group(1).strip() not in ['NODATA', 'NOTGIVEN', '']:
                              meta[key] = m.group(1).strip()
                      
                      title = meta.get('title', file[:60])
                      clean = clean_text(raw_text)
                      
                      safe_name = re.sub(r'[^\w\-_]', '_', title)[:60]
                      txt_path = os.path.join(author_dir, f"{safe_name}.txt")
                      
                      with open(txt_path, 'w', encoding='utf-8') as f:
                          f.write(f"العنوان: {title}\n")
                          if 'author' in meta: f.write(f"المؤلف: {meta['author']}\n")
                          f.write("="*70 + "\n\n")
                          f.write(clean)
                      
                      books_extracted.append({"title": title, "size_mb": round(size/(1024*1024),2), "text_length": len(clean)})
                      print(f"   ✅ {title} ({round(size/(1024*1024),1)} MB)")
              
              with open(os.path.join(author_dir, "metadata.json"), 'w', encoding='utf-8') as f:
                  json.dump({"author": title_ar, "total_books": len(books_extracted), "books": books_extracted}, f, ensure_ascii=False, indent=2)
              ALL_SUMMARY.append({"author": title_ar, "total_books": len(books_extracted)})
          
          # گزارش نهایی
          with open(os.path.join(FINAL_DIR, "00_INDEX.json"), 'w', encoding='utf-8') as f:
              json.dump({"total_authors": len(ALL_SUMMARY), "authors": ALL_SUMMARY, "missing": MISSING_AUTHORS}, f, ensure_ascii=False, indent=2)
          
          print(f"\n{'='*70}")
          print(f"🎉 گزارش نهایی:")
          print(f"{'='*70}")
          print(f"✅ استخراج شده: {len(ALL_SUMMARY)} نویسنده")
          print(f"❌ پیدا نشده: {len(MISSING_AUTHORS)} نویسنده")
          if MISSING_AUTHORS:
              print(f"\n📋 گمشده‌ها:")
              for m in MISSING_AUTHORS:
                  print(f"   • {m}")
      
      - name: Upload Final Package
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-38-AUTHORS
          path: final_package/
          retention-days: 7
          compression-level: 6
