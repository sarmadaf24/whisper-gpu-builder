name: SCAN & EXTRACT - 14 Hanbali Authors

on:
  workflow_dispatch:

jobs:
  extract-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup Python & Deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PyYAML
        run: pip install pyyaml
      
      - name: SCAN & EXTRACT ALL 14 HANBALI
        shell: python
        run: |
          import os, json, subprocess, re
          
          # لیست با الگوهای جستجو
          AUTHORS = [
              {"name": "امام_احمد_حنبل", "patterns": ["IbnHanbal", "حنبل", "Hanbal", "Musnad", "مسند", "AhmadHanbal"], "title_ar": "الإمام أحمد بن حنبل"},
              {"name": "ابن_حامد", "patterns": ["IbnHamid", "حامد", "CabdAllahIbnHamid", "AbuAbdAllahHamid"], "title_ar": "أبو عبد الله ابن حامد"},
              {"name": "بربهاری", "patterns": ["Barbahari", "بربهاري", "SharhSunna", "شرح_سنه"], "title_ar": "أبو عبد الله البربهاري"},
              {"name": "ابویعلی", "patterns": ["AbuYacla", "ابویعلی", "IbnHusaynAbuYacla", "طبقات_حنابله", "TabaqatHanabila"], "title_ar": "محمد بن الحسين أبو يعلى"},
              {"name": "ابن_عقیل", "patterns": ["IbnCaqil", "عقیل", "AbuWafa", "ابوالوفا", "Funun", "فنون"], "title_ar": "أبو الوفاء ابن عقيل"},
              {"name": "ابن_قدامه", "patterns": ["IbnQudama", "قدامه", "MuwaffaqDin", "موفق", "Mughni", "مغني", "Cumda", "عمده"], "title_ar": "موفق الدين ابن قدامة"},
              {"name": "شمس_قدامه", "patterns": ["ShamsDinIbnQudama", "شمس_قدامه", "SharhKabir", "شرح_کبیر"], "title_ar": "شمس الدين ابن قدامة"},
              {"name": "ابن_تیمیه", "patterns": ["IbnTaymiyya", "تیمیه", "Taymiyya", "Fatawa", "فتاوی", "Iman", "ایمان"], "title_ar": "تقي الدين ابن تيمية"},
              {"name": "ابن_قیم", "patterns": ["IbnQayyim", "قیم", "QayyimJawziyya", "زاد", "ZadMacad", "اعلام", "Iclam"], "title_ar": "ابن قيم الجوزية"},
              {"name": "ابن_رجب", "patterns": ["IbnRajab", "رجب", "RajabHanbali", "Qawacid", "قواعد", "فتح_باری", "FathBari"], "title_ar": "ابن رجب الحنبلي"},
              {"name": "ابن_مفلح", "patterns": ["IbnMuflih", "مفلح", "ShamsDinMuflih", "Furuc", "فروع", "AdabSharciyya"], "title_ar": "شمس الدين ابن مفلح"},
              {"name": "مرداوی", "patterns": ["Mardawi", "مرداوي", "CalaDinMardawi", "Insaf", "انصاف", "Tashih"], "title_ar": "علاء الدين المرداوي"},
              {"name": "حجاوی", "patterns": ["Hajjawi", "حجاوي", "ShamsDinHajjawi", "Iqnac", "اقناع", "ZadMustaqnic"], "title_ar": "شمس الدين الحجاوي"},
              {"name": "بهوتی", "patterns": ["Buhuti", "بهوتي", "MansurBuhuti", "RawdMurbic", "روض", "Kashshaf", "کشاف"], "title_ar": "منصور بن يونس البهوتي"},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(200, 1100, 25)]
          
          cloned_repos = {}
          FINAL_DIR = "final_package"
          os.makedirs(FINAL_DIR, exist_ok=True)
          
          def clean_text(raw_text):
              lines = raw_text.split('\n')
              clean_lines = []
              for line in lines:
                  if re.match(r'^#META#', line.strip()): continue
                  if line.strip() == '#META#Header#End#': continue
                  if re.match(r'^PageV', line.strip()): continue
                  if re.match(r'^ms\d+$', line.strip()): continue
                  if '~~' in line: line = line.replace('~~', '')
                  if line.startswith('### |') or line.startswith('### ||'): continue
                  if line.startswith('# '): line = line[2:]
                  elif line.startswith('## '): line = line[3:]
                  elif line.startswith('### '): line = line[4:]
                  clean_lines.append(line)
              
              result = []
              prev_empty = False
              for line in clean_lines:
                  is_empty = not line.strip()
                  if is_empty and prev_empty: continue
                  result.append(line)
                  prev_empty = is_empty
              return '\n'.join(result).strip()
          
          # مرحله ۱: اسکن
          print("🔍 مرحله ۱: اسکن مخازن...")
          author_folders = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              if folder not in [f["folder"] for f in author_folders[author["name"]]]:
                                  author_folders[author["name"]].append({
                                      "repo": repo_name, "folder": folder, "size_mb": round(total_size/(1024*1024),2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          # نمایش نتایج اسکن
          print(f"\n\n📊 نتایج اسکن:")
          FINAL_AUTHORS = []
          for author in AUTHORS:
              items = author_folders[author["name"]]
              best = max(items, key=lambda x: x['size_mb']) if items else None
              if best and best['size_mb'] > 0.5:
                  print(f"   ✅ {author['name']}: {best['folder']} ({best['size_mb']} MB)")
                  FINAL_AUTHORS.append({
                      "name": author['name'],
                      "folder": best['folder'],
                      "repo": best['repo'],
                      "title_ar": author['title_ar']
                  })
              else:
                  print(f"   ❌ {author['name']}: پیدا نشد")
          
          # مرحله ۲: استخراج
          print(f"\n📚 مرحله ۲: استخراج {len(FINAL_AUTHORS)} نویسنده...")
          ALL_SUMMARY = []
          
          for idx, author in enumerate(FINAL_AUTHORS, 1):
              author_name = author['name']
              folder_name = author['folder']
              repo_name = author['repo']
              title_ar = author['title_ar']
              
              print(f"\n{'#'*70}")
              print(f"📚 [{idx}/{len(FINAL_AUTHORS)}] {title_ar}")
              
              author_dir = os.path.join(FINAL_DIR, author_name)
              os.makedirs(author_dir, exist_ok=True)
              
              if repo_name not in cloned_repos:
                  repo_dir = f"repo_{repo_name}"
                  if not os.path.exists(repo_dir):
                      subprocess.run(["git", "clone", "--depth", "1", 
                                      f"https://github.com/OpenITI/{repo_name}.git", repo_dir], 
                                     check=True, capture_output=True)
                  cloned_repos[repo_name] = repo_dir
              
              folder_path = os.path.join(cloned_repos[repo_name], "data", folder_name)
              books_extracted = []
              
              for root, dirs, files in os.walk(folder_path):
                  for file in sorted(files):
                      file_path = os.path.join(root, file)
                      try: size = os.path.getsize(file_path)
                      except: continue
                      
                      if size < 50000: continue
                      if file.endswith(('.yml', '.md')): continue
                      
                      try:
                          with open(file_path, 'r', encoding='utf-8') as f:
                              raw_text = f.read()
                      except: continue
                      
                      meta = {}
                      for key, pattern in {
                          'title': r'#META#\s+020\.BookTITLE\s+::\s+(.+)',
                          'author': r'#META#\s+010\.AuthorNAME\s+::\s+(.+)',
                          'subject': r'#META#\s+021\.BookSUBJ\s+::\s+(.+)',
                          'volumes': r'#META#\s+022\.BookVOLS\s+::\s+(.+)',
                      }.items():
                          m = re.search(pattern, raw_text)
                          if m and m.group(1).strip() not in ['NODATA', 'NOTGIVEN', '']:
                              meta[key] = m.group(1).strip()
                      
                      title = meta.get('title', file.replace(folder_name+'.', ''))
                      clean = clean_text(raw_text)
                      
                      safe_name = re.sub(r'[^\w\-_]', '_', title)[:60]
                      txt_path = os.path.join(author_dir, f"{safe_name}.txt")
                      
                      with open(txt_path, 'w', encoding='utf-8') as f:
                          f.write(f"العنوان: {title}\n")
                          if 'author' in meta: f.write(f"المؤلف: {meta['author']}\n")
                          f.write("="*70 + "\n\n")
                          f.write(clean)
                      
                      books_extracted.append({"title": title, "size_mb": round(size/(1024*1024),2), "text_length": len(clean), "metadata": meta})
                      print(f"   ✅ {title} ({round(size/(1024*1024),1)} MB)")
              
              with open(os.path.join(author_dir, "metadata.json"), 'w', encoding='utf-8') as f:
                  json.dump({"author": title_ar, "total_books": len(books_extracted), "books": books_extracted}, f, ensure_ascii=False, indent=2)
              
              ALL_SUMMARY.append({"author": title_ar, "total_books": len(books_extracted)})
          
          with open(os.path.join(FINAL_DIR, "00_INDEX.json"), 'w', encoding='utf-8') as f:
              json.dump({"total_authors": len(ALL_SUMMARY), "authors": ALL_SUMMARY}, f, ensure_ascii=False, indent=2)
          
          print(f"\n🎉 تمام! {len(ALL_SUMMARY)} نویسنده پردازش شد")
      
      - name: Upload Final Package
        uses: actions/upload-artifact@v4
        with:
          name: ALL-14-HANBALI-FINAL
          path: final_package/
          retention-days: 7
          compression-level: 6
