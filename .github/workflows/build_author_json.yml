name: SCAN - 20 More Shia Authors

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: SCAN ALL 20 AUTHORS
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "سید_بن_طاووس", "patterns": ["Tawus", "طاووس", "IbnTawus"]},
              {"name": "شهید_اول", "patterns": ["ShahidAwwal", "شهيد", "شهید", "MuhammadMakki", "Makki"]},
              {"name": "فخر_المحققین", "patterns": ["FakhrMuhaqqiqin", "فخر", "IbnMutahhar", "ابن_مطهر"]},
              {"name": "فاضل_مقداد", "patterns": ["FadilMiqdad", "مقداد", "Siwri", "سیوري"]},
              {"name": "شهید_ثانی", "patterns": ["ShahidThani", "ZaynDin", "زین_الدین", "عاملي", "Amili"]},
              {"name": "شیخ_بهایی", "patterns": ["BahaDin", "بهایی", "بهاء", "BahaAmili"]},
              {"name": "میرداماد", "patterns": ["MirDamad", "داماد", "Astarabadi", "استرآبادي"]},
              {"name": "فیض_کاشانی", "patterns": ["FaydKashani", "فيض", "فیض", "Muhsin"]},
              {"name": "علامه_مجلسی", "patterns": ["Majlisi", "مجلسی", "Majlisi", "Bihar"]},
              {"name": "حر_عاملی", "patterns": ["HurrAmili", "حر", "عاملي", "Wasaic"]},
              {"name": "نعمت_الله_جزایری", "patterns": ["NicmatAllah", "نعمت", "Jazairi", "جزایري"]},
              {"name": "محقق_سبزواری", "patterns": ["Sabzawari", "سبزواري", "Muhaqqiq"]},
              {"name": "وحید_بهبهانی", "patterns": ["WahidBihbahani", "وحید", "بهبهاني", "Bihbahani"]},
              {"name": "بحرالعلوم", "patterns": ["BahrUlum", "بحر", "علوم", "Mahdi"]},
              {"name": "میرزای_قمی", "patterns": ["MirzaQummi", "میرزا", "قمی", "Qummi"]},
              {"name": "کاشف_الغطاء", "patterns": ["KashifGhita", "کاشف", "غطاء", "Jacfar"]},
              {"name": "سید_محمد_مجاهد", "patterns": ["MujahidTabatabai", "مجاهد", "طباطبايي"]},
              {"name": "محدث_نوری", "patterns": ["MuhaddithNuri", "نوري", "نوری", "Mustadrak"]},
              {"name": "شیخ_انصاری", "patterns": ["MurtadaAnsari", "انصاري", "انصاری", "Ansari"]},
              {"name": "صاحب_جواهر", "patterns": ["SahibJawahir", "جواهر", "Najafi", "نجفي"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(600, 1400, 25)]
          
          final_results = {}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              if author["name"] not in final_results:
                                  final_results[author["name"]] = []
                              
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              final_results[author["name"]].append({
                                  "repo": repo_name,
                                  "folder": folder,
                                  "size_mb": round(total_size/(1024*1024), 2)
                              })
                              found_any = True
                              break
              
              if found_any:
                  print(f"🎯")
              else:
                  print(".")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          # ذخیره نتایج
          with open("scan_20_results.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
          
          print(f"\n📊 نتایج:")
          for author in AUTHORS:
              count = len(final_results.get(author["name"], []))
              print(f"   {author['name']}: {count} پوشه")
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-20-results
          path: scan_20_results.json
          retention-days: 7
