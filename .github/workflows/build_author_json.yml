name: DEBUG - See Dhahabi Structure

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Clone and Show Full Structure
        shell: python
        run: |
          import os
          import subprocess
          
          # کلون مخزن
          repo_url = "https://github.com/OpenITI/0750AH.git"
          target_dir = "repo"
          
          print("📥 کلون کردن مخزن...")
          subprocess.run(["git", "clone", "--depth", "1", repo_url, target_dir], check=True)
          
          dhahabi_path = os.path.join(target_dir, "data", "0748Dhahabi")
          
          print("\n" + "="*70)
          print("📁 ساختار کامل پوشه 0748Dhahabi:")
          print("="*70)
          
          # نمایش درختی با جزئیات
          for root, dirs, files in os.walk(dhahabi_path):
              level = root.replace(dhahabi_path, '').count(os.sep)
              indent = '│  ' * level
              folder_name = os.path.basename(root) if level > 0 else '0748Dhahabi'
              print(f'{indent}├─ 📁 {folder_name}/')
              
              subindent = '│  ' * (level + 1)
              
              # اول README.md
              for file in sorted(files):
                  if file == 'README.md':
                      filepath = os.path.join(root, file)
                      size = os.path.getsize(filepath)
                      # خواندن ۲۰۰ کاراکتر اول برای دیدن عنوان
                      with open(filepath, 'r', encoding='utf-8') as f:
                          first_line = f.readline().strip()
                      print(f'{subindent}├─ 📋 {file} ({size:,} bytes) - {first_line[:100]}')
              
              # بعد فایل‌های متنی
              for file in sorted(files):
                  if file != 'README.md' and file.endswith(('.mARkdown', '.txt', '.md')):
                      filepath = os.path.join(root, file)
                      size = os.path.getsize(filepath)
                      # خواندن خط اول برای عنوان
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              first_lines = ''.join([f.readline() for _ in range(3)])
                      except:
                          first_lines = "N/A"
                      print(f'{subindent}├─ 📄 {file} ({size:,} bytes)')
                      if first_lines.strip():
                          preview = first_lines.strip()[:150].replace('\n', ' ')
                          print(f'{subindent}│  └─ {preview}...')
              
              # فقط ۳ سطح اول
              if level >= 2:
                  print(f'{subindent}└─ ... (بقیه فایل‌ها)')
                  dirs.clear()
          
          # آمار کلی
          print("\n" + "="*70)
          print("📊 آمار:")
          
          total_files = 0
          total_size = 0
          extensions = {}
          
          for root, dirs, files in os.walk(dhahabi_path):
              for file in files:
                  total_files += 1
                  filepath = os.path.join(root, file)
                  size = os.path.getsize(filepath)
                  total_size += size
                  
                  ext = os.path.splitext(file)[1] or 'no_ext'
                  extensions[ext] = extensions.get(ext, 0) + 1
          
          print(f"   📁 پوشه‌ها: {sum(1 for _ in os.walk(dhahabi_path))}")
          print(f"   📄 فایل‌ها: {total_files}")
          print(f"   💾 حجم کل: {total_size:,} bytes ({total_size/(1024*1024):.1f} MB)")
          print(f"\n   پسوند فایل‌ها:")
          for ext, count in sorted(extensions.items()):
              print(f"     {ext}: {count} فایل")
          
          # نمایش لیست زیرپوشه‌های سطح اول
          print("\n" + "="*70)
          print("📚 زیرپوشه‌های سطح اول (هر کدام یک کتاب):")
          print("="*70)
          
          subfolders = [d for d in os.listdir(dhahabi_path) 
                       if os.path.isdir(os.path.join(dhahabi_path, d))]
          
          for i, sf in enumerate(sorted(subfolders), 1):
              sf_path = os.path.join(dhahabi_path, sf)
              readme = os.path.join(sf_path, 'README.md')
              
              title = sf
              if os.path.exists(readme):
                  with open(readme, 'r', encoding='utf-8') as f:
                      content = f.read(500)
                      if 'title:' in content.lower():
                          for line in content.split('\n'):
                              if line.strip().startswith('title:') or line.strip().startswith('Title:'):
                                  title = line.split(':', 1)[1].strip()
                                  break
              
              # محاسبه حجم
              size = 0
              for root, _, files in os.walk(sf_path):
                  for f in files:
                      size += os.path.getsize(os.path.join(root, f))
              
              print(f"{i:2d}. {sf}")
              print(f"    عنوان: {title}")
              print(f"    حجم: {size:,} bytes")
              print()
