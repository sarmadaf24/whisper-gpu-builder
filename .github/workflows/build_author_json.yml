name: SCAN - 20 More Authors Batch 3

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: SCAN ALL 20
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              {"name": "آخوند_خراسانی", "patterns": ["Akhund", "آخوند", "Khorasani", "خراساني", "Kifaya", "کفایه"]},
              {"name": "علامه_طباطبایی", "patterns": ["Tabatabai", "طباطبايي", "MuhammadHusayn", "Mizan", "میزان"]},
              {"name": "آقابزرگ_تهرانی", "patterns": ["AghaBuzurg", "آقابزرگ", "Tihrani", "طهراني", "Dhariya", "ذریعه"]},
              {"name": "ابن_ابی_عقیل_عمانی", "patterns": ["IbnAbiCaqil", "عماني", "Cumani", "عقیل"]},
              {"name": "ابن_جنید_اسکافی", "patterns": ["IbnJunayd", "جنید", "Iskafi", "اسكافي"]},
              {"name": "ابن_فهد_حلی", "patterns": ["IbnFahd", "فهد", "Hilli", "حلي", "Cudda", "عدة"]},
              {"name": "ابوالفتح_کراجکی", "patterns": ["Karajaki", "كراجكي", "AbuFath", "ابوالفتح"]},
              {"name": "سید_عبدالله_شبر", "patterns": ["Shubbar", "شبر", "AbdAllah", "عبدالله"]},
              {"name": "سید_حسن_صدر", "patterns": ["HasanSadr", "صدر", "SadrDin", "تأسیس"]},
              {"name": "محمد_تقی_شوشتری", "patterns": ["Shushtari", "شوشتري", "MuhammadTaqi", "بهج"]},
              {"name": "محمد_حسین_کاشف_الغطاء", "patterns": ["MuhammadHusaynKashif", "كاشف", "غطاء"]},
              {"name": "محمد_تقی_بهجة", "patterns": ["Bahja", "بهجة", "بهجت", "MuhammadTaqiBahja"]},
              {"name": "گلپایگانی", "patterns": ["Gulpaygani", "گلپایگاني", "Gulpaygani"]},
              {"name": "حسن_بن_سلیمان_حلی", "patterns": ["HasanIbnSulayman", "حسن_سلیمان", "Hilli", "مختصر"]},
              {"name": "مامقانی", "patterns": ["Mamaqani", "مامقاني", "Miqbas", "مقباس"]},
              {"name": "سید_ابوالقاسم_خویی", "patterns": ["Khui", "خويي", "خویی", "AbuQasim", "ابوالقاسم"]},
              {"name": "شیخ_فضل_الله_نوری", "patterns": ["FadlAllahNuri", "فضل_الله", "نوري", "نوری"]},
              {"name": "عبدالکریم_قمی", "patterns": ["AbdKarimQummi", "عبدالکریم", "قمی"]},
              {"name": "سید_محمد_حسین_طباطبایی", "patterns": ["MuhammadHusaynTabatabai", "حسین_طباطبايي"]},
              {"name": "محمد_محسن_تهرانی", "patterns": ["MuhammadMuhsin", "محسن", "Tihrani", "طهراني"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(300, 1500, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              repo_dir = f"repo_{repo_name}"
              
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", repo_url, repo_dir], 
                                         capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) 
                                             for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({
                                      "repo": repo_name,
                                      "folder": folder,
                                      "size_mb": round(total_size/(1024*1024), 2)
                                  })
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          print(f"\n\n{'='*70}")
          print("📊 نتایج:")
          for author in AUTHORS:
              items = final_results[author["name"]]
              print(f"   {author['name']}: {len(items)} پوشه")
              for item in items:
                  print(f"      📁 {item['repo']}/{item['folder']} ({item['size_mb']} MB)")
          
          with open("scan_batch3.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-batch3-results
          path: scan_batch3.json
          retention-days: 7
