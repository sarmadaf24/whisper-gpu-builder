name: FINAL DEEP SEARCH - 21 Authors

on:
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: ULTRA DEEP SCAN
        shell: python
        run: |
          import os, json, subprocess
          
          AUTHORS = [
              # ۱۲ شیعه
              {"name": "جابر_جعفی", "patterns": ["JabirJufi", "JabirYazid", "جعفي", "Juci", "تفسیر_جابر", "TafsirJabir", "جابر_بن_یزید", "JabirIbnYazid", "ابوحمزه", "AbuHamza", "Thumali", "ثمالي", "رساله_جابر"]},
              {"name": "فضل_شاذان", "patterns": ["FadlShadhan", "فضل_شاذان", "ایضاح", "Idah", "Iydah", "نیشابوری_فضل", "FadlNaysaburi", "علل_شاذان", "CilalShadhan", "ابن_شاذان", "IbnShadhan"]},
              {"name": "قطب_راوندی", "patterns": ["QutbRawandi", "راوندي", "Rawandi", "خرائج", "Kharacij", "Kharaij", "قصص_انبیا", "QisasAnbiya", "سعید_راوندی", "SacidRawandi", "منهاج_براعه", "MinhajBaraca"]},
              {"name": "سید_محمد_مجاهد", "patterns": ["MujahidTabatabai", "مجاهد_طباطبايي", "مناهل", "Manahil", "محمد_مجاهد", "MuhammadMujahid", "کربلایی", "Karbalai", "صاحب_ریاض", "SahibRiyad"]},
              {"name": "مامقانی", "patterns": ["Mamaqani", "مامقاني", "مقباس", "Miqbas", "تنقیح_مقال", "TanqihMaqal", "عبدالله_مامقاني", "AbdAllahMamaqani", "مرآه_کمال", "MiratKamal"]},
              {"name": "شوشتری", "patterns": ["Shushtari", "شوشتري", "تستري", "Tustari", "قاموس_رجال", "QamusRijal", "بهج_صباغه", "BahjSabbagha", "محمد_تقی_تستری", "MuhammadTaqiTustari"]},
              {"name": "بهجة", "patterns": ["Bahjat", "بهجت", "MuhammadTaqiBahjat", "رساله_عملیه", "RisalaCamaliyya", "بهجه", "Bahja", "تقی_بهجت", "TaqiBahjat", "فتاوی_بهجت"]},
              {"name": "حسن_سلیمان_حلی", "patterns": ["HasanSulayman", "حسن_سلیمان", "مختصر_بصایر", "MukhtasarBasair", "محاسن_حلی", "MahasinHilli", "حسن_حلی", "HasanHilli", "محتضر", "Muhtadar"]},
              {"name": "رضی_الدین_طاووس", "patterns": ["RadiDinTawus", "رضی_طاووس", "IbnTawusRadi", "لهوف", "Luhuf", "علی_طاووس", "AliTawus", "فرج_مهموم", "FarajMahmum", "یقین", "Yaqin"]},
              {"name": "یحیی_سعید_حلی", "patterns": ["YahyaSacid", "یحیی_سعید", "جامع_شرایع", "JamicSharaic", "نزهه_ناظر", "NuzhatNazir", "یحیی_حلی", "YahyaHilli", "مستدرک_مختار"]},
              {"name": "خامنه_ای", "patterns": ["Khaminai", "خامنه_اي", "Khamenei", "خامنه_ای", "علی_خامنه_ای", "AliKhamenei", "سید_علی", "SayyidAliKhaminai"]},
              {"name": "ملا_خسرو", "patterns": ["MullaKhusru", "ملاخسرو", "Khusru", "خسرو", "درر_حکام", "DurarHukkam", "غرر_احکام", "GhurarAhkam", "ملا_خسرو_حنفی", "MullaKhusruHanafi"]},
              
              # ۹ اهل سنت و علوم
              {"name": "ظهیرالدین_بخاری", "patterns": ["ZahirDinBukhari", "ظهیر_بخاری", "فتاوی_ظهیریه", "Zahiriyya", "ظهیریه", "ZahirDinMuhammad", "فتاوی_بخاری"]},
              {"name": "والوالجی", "patterns": ["Walwaliji", "والوالجي", "فتاوی_والوالجیه", "Walwalijiyya", "عبدالرشید", "AbdRashid", "والوالج"]},
              {"name": "زرقانی", "patterns": ["Zarqani", "زرقاني", "شرح_موطأ", "SharhMuwatta", "محمد_زرقانی", "MuhammadZarqani", "زرقانی_مالکی"]},
              {"name": "بربهاری", "patterns": ["Barbahari", "بربهاري", "شرح_سنه", "SharhSunna", "ابومحمد_بربهاری", "AbuMuhammadBarbahari", "BarbahariHanbali"]},
              {"name": "خوارزمی_ریاضی", "patterns": ["MuhammadIbnMusa", "خوارزمي", "Khwarizmi", "جبر_مقابله", "JabrMuqabala", "خوارزمی_جبر", "KhwarizmiMath", "موسی_خوارزمی", "MusaKhwarizmi"]},
              {"name": "مولانا_رومی", "patterns": ["JalalDinRumi", "رومي", "Rumi", "مثنوي", "Mathnawi", "مولانا", "Mawlana", "مولوی", "Mawlawi", "جلال_الدین_رومی"]},
              {"name": "ابن_قاسم_مالکی", "patterns": ["IbnQasim", "ابن_قاسم", "مدونه", "Mudawwana", "عبدالرحمن_قاسم", "CabdRahmanQasim", "قاسم_مالکی", "QasimMaliki"]},
              {"name": "جلال_محلی", "patterns": ["JalalMahalli", "محلي", "Mahalli", "کنز_راغبین", "KanzRaghibin", "جلال_الدین_محلی", "JalalDinMahalli"]},
              {"name": "شمس_قدامه", "patterns": ["ShamsDinIbnQudama", "شمس_قدامه", "شرح_کبیر", "SharhKabir", "عبدالرحمن_قدامه", "CabdRahmanQudama", "شمس_الدین_قدامه"]},
          ]
          
          REPOS = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          final_results = {a["name"]: [] for a in AUTHORS}
          
          for repo_name in REPOS:
              repo_dir = f"repo_{repo_name}"
              print(f"📦 {repo_name}...", end=" ")
              
              if not os.path.exists(repo_dir):
                  result = subprocess.run(["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo_name}.git", repo_dir], capture_output=True, text=True)
                  if result.returncode != 0:
                      print("❌")
                      continue
              
              data_dir = os.path.join(repo_dir, "data")
              if not os.path.exists(data_dir):
                  print("∅")
                  continue
              
              folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              found_any = False
              
              for author in AUTHORS:
                  for folder in folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              folder_path = os.path.join(data_dir, folder)
                              total_size = sum(os.path.getsize(os.path.join(r,f)) for r,_,fs in os.walk(folder_path) for f in fs)
                              
                              # فقط > 100KB
                              if total_size < 100000:
                                  continue
                              
                              existing = [f["folder"] for f in final_results[author["name"]]]
                              if folder not in existing:
                                  final_results[author["name"]].append({"repo": repo_name, "folder": folder, "size_mb": round(total_size/(1024*1024),2)})
                                  found_any = True
                                  print(f"\n      🎯 {author['name']}: {folder} ({round(total_size/(1024*1024),1)} MB)")
                              break
              
              if not found_any:
                  print(".", end="")
                  subprocess.run(["rm", "-rf", repo_dir], check=False)
          
          # گزارش نهایی
          print(f"\n\n{'='*70}")
          print("📊 گزارش نهایی Deep Search:")
          print(f"{'='*70}")
          
          found_count = 0
          missing = []
          
          for author in AUTHORS:
              items = final_results[author["name"]]
              if items:
                  best = max(items, key=lambda x: x['size_mb'])
                  print(f"   ✅ {author['name']}: {best['folder']} ({best['size_mb']} MB)")
                  found_count += 1
              else:
                  print(f"   ❌ {author['name']}: پیدا نشد")
                  missing.append(author['name'])
          
          print(f"\n✅ پیدا شده: {found_count}")
          print(f"❌ گمشده: {len(missing)}")
          if missing:
              print(f"\n📋 گمشده‌های نهایی:")
              for m in missing:
                  print(f"   • {m}")
          
          with open("final_deep_scan.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: final-deep-scan-results
          path: final_deep_scan.json
          retention-days: 7
