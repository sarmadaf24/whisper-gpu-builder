name: COMPLETE SCAN 20 Shia Authors

on:
  workflow_dispatch:

jobs:
  complete-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 ساعت
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Full Deep Scan
        shell: python
        run: |
          import os, json, subprocess, time

          # لیست ۲۰ نویسنده با الگوها
          authors = [
              {"name": "ثابت_بن_دینار", "patterns": ["Thabit", "Dinar", "ثابت", "دینار", "ابوحمزه", "AbuHamza", "Thumali", "ثمالي"]},
              {"name": "جابر_جعفی", "patterns": ["Jabir", "Jufi", "Juci", "جعفي", "جعفی", "جابر", "JabirJuci", "JabirYazid"]},
              {"name": "فضل_شاذان", "patterns": ["FadlShadhan", "Fadl", "Shadhan", "فضل", "شاذان", "FadlIbnShadhan", "Naysaburi", "Nishapuri", "ایضاح", "علل"]},
              {"name": "احمد_برقی", "patterns": ["AhmadBarqi", "Barqi", "برقي", "برقی", "محاسن", "Mahasin"]},
              {"name": "احمد_بن_ابی_عبدالله_برقی", "patterns": ["AhmadIbnAbiAbdAllahBarqi", "Barqi", "برقي", "برقی"]},
              {"name": "صفار_قمی", "patterns": ["SaffarQummi", "Saffar", "صفار", "بصائر", "Basair"]},
              {"name": "علی_قمی", "patterns": ["AliIbrahimQummi", "Qummi", "قمي", "قمی", "TafsirQummi", "تفسیر", "تفسير"]},
              {"name": "کلینی", "patterns": ["Kulayni", "Kulini", "Kafi", "كافي", "کلینی", "كليني", "الكليني", "UsulKafi", "FuruKafi", "RawdatKafi"]},
              {"name": "نجاشی", "patterns": ["Najashi", "نجاشي", "نجاشی", "RijalNajashi", "Fihrist", "فهرست"]},
              {"name": "کشی", "patterns": ["Kashshi", "Kashi", "كشي", "کشی", "RijalKashshi", "Ikhtiyar", "اختیار", "معرفه"]},
              {"name": "شیخ_صدوق", "patterns": ["Saduq", "Saduk", "صدوق", "بابویه", "Babawayh", "فقیه", "Faquih", "امالی", "Amali", "خصال"]},
              {"name": "شیخ_مفید", "patterns": ["Mufid", "مفيد", "مفید", "ارشاد", "Irshad", "اعتقادات"]},
              {"name": "سید_رضی", "patterns": ["Radi", "رضي", "رضی", "SharifRadi", "نهج", "بلاغه", "NahjBalagha"]},
              {"name": "سید_مرتضی", "patterns": ["Murtada", "مرتضی", "مرتضي", "SharifMurtada", "امالی", "Amali", "ذریعه"]},
              {"name": "شیخ_طوسی", "patterns": ["Tusi", "طوسي", "طوسی", "Tahdhib", "تهذیب", "استبصار", "Istibsar", "Mabsut", "مبسوط", "تبیان"]},
              {"name": "ابن_شهرآشوب", "patterns": ["IbnShahrAshub", "شهرآشوب", "مناقب", "Manaqib"]},
              {"name": "قطب_راوندی", "patterns": ["QutbRawandi", "راوندي", "راوندی", "خرائج", "Kharaij"]},
              {"name": "عمادالدین_طبری", "patterns": ["CimadDinTabari", "طبری", "طبري", "بشاره", "مصباح"]},
              {"name": "محقق_حلی", "patterns": ["MuhaqqiqHilli", "حلي", "حلی", "محقق", "شرایع", "Sharaic"]},
              {"name": "علامه_حلی", "patterns": ["AllamaHilli", "حلي", "حلی", "علامه", "تذکره", "مختلف", "ارشاد"]}
          ]

          # مخازن برای بررسی (همه)
          repos = [f"{c:04d}AH" for c in range(0, 1500, 25)]
          
          # دیکشنری نتیجه نهایی
          final_results = {author["name"]: [] for author in authors}

          for repo_name in repos:
              repo_url = f"https://github.com/OpenITI/{repo_name}.git"
              target_dir = f"repo_{repo_name}"
              
              print(f"📦 بررسی {repo_name} ...", end=" ")
              
              # کلون
              clone_result = subprocess.run(
                  ["git", "clone", "--depth", "1", "--single-branch", repo_url, target_dir],
                  capture_output=True, text=True
              )
              if clone_result.returncode != 0:
                  print("❌ (کلون ناموفق)")
                  continue
              
              data_dir = os.path.join(target_dir, "data")
              if not os.path.exists(data_dir):
                  subprocess.run(["rm", "-rf", target_dir], check=False)
                  print("∅")
                  continue
              
              all_folders = [f for f in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, f))]
              print(f"{len(all_folders)} پوشه")
              
              # جستجو برای هر نویسنده
              for author in authors:
                  for folder in all_folders:
                      folder_lower = folder.lower()
                      for pat in author["patterns"]:
                          if pat.lower() in folder_lower:
                              # بررسی حجم و وجود mARkdown
                              folder_path = os.path.join(data_dir, folder)
                              total_size = 0
                              has_mARkdown = False
                              for root, _, files in os.walk(folder_path):
                                  for f in files:
                                      total_size += os.path.getsize(os.path.join(root, f))
                                      if f.endswith('.mARkdown'):
                                          has_mARkdown = True
                              # افزودن به نتایج
                              final_results[author["name"]].append({
                                  "repo": repo_name,
                                  "folder": folder,
                                  "size_bytes": total_size,
                                  "has_mARkdown": has_mARkdown
                              })
                              break  # پترن یکسان برای یک نویسنده فقط یک بار
              
              # حذف مخزن
              subprocess.run(["rm", "-rf", target_dir], check=False)
              time.sleep(0.5)  # کمی استراحت

          # ذخیره JSON نهایی
          with open("complete_scan.json", "w", encoding="utf-8") as f:
              json.dump(final_results, f, ensure_ascii=False, indent=2)

          # خلاصه
          print("\n📊 نتایج نهایی:")
          for author in authors:
              count = len(final_results[author["name"]])
              print(f"{author['name']}: {count} کتاب")
      
      - name: Upload Final JSON
        uses: actions/upload-artifact@v4
        with:
          name: complete-scan-20
          path: complete_scan.json
          retention-days: 7
