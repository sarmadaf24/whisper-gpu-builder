name: DOWNLOAD from Shamela via OpenITI

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install pyyaml requests
      
      - name: Find Shamela Links & Download
        shell: python
        run: |
          import os, json, subprocess, re, requests, time
          
          AUTHORS = [
              {"name": "جابر_جعفی", "folder": "0148AbuHamzaThumali", "repo": "0150AH"},
              {"name": "فضل_شاذان", "folder": "0260IbnShadhanAzdi", "repo": "0275AH"},
              {"name": "قطب_راوندی", "folder": "", "repo": ""},
              {"name": "مامقانی", "folder": "", "repo": ""},
              {"name": "شوشتری", "folder": "", "repo": ""},
              {"name": "حسن_سلیمان_حلی", "folder": "", "repo": ""},
              {"name": "فخر_المحققین", "folder": "0728IbnMutahharZaydi", "repo": "0750AH"},
              {"name": "رضی_الدین_طاووس", "folder": "0664IbnTawus", "repo": "0675AH"},
              {"name": "یحیی_سعید_حلی", "folder": "", "repo": ""},
              {"name": "بهجة", "folder": "", "repo": ""},
              {"name": "سید_محمد_مجاهد", "folder": "", "repo": ""},
              {"name": "خامنه_ای", "folder": "", "repo": ""},
          ]
          
          OUTPUT_DIR = "shamela_downloads"
          os.makedirs(OUTPUT_DIR, exist_ok=True)
          
          for author in AUTHORS:
              name = author['name']
              folder = author['folder']
              repo = author['repo']
              
              print(f"\n{'='*60}")
              print(f"🔍 {name}")
              print(f"{'='*60}")
              
              if not folder or not repo:
                  print("   ⚠️ پوشه/مخزن نامشخص - رد می‌شود")
                  continue
              
              # کلون مخزن
              repo_dir = f"repo_{repo}"
              if not os.path.exists(repo_dir):
                  print(f"   📥 کلون {repo}...")
                  result = subprocess.run(
                      ["git", "clone", "--depth", "1", f"https://github.com/OpenITI/{repo}.git", repo_dir],
                      capture_output=True, text=True
                  )
                  if result.returncode != 0:
                      print("   ❌ کلون ناموفق")
                      continue
              
              folder_path = os.path.join(repo_dir, "data", folder)
              if not os.path.exists(folder_path):
                  print(f"   ❌ پوشه {folder} یافت نشد")
                  continue
              
              # جستجوی لینک شامله
              shamela_ids = set()
              for root, _, files in os.walk(folder_path):
                  for file in files:
                      if file.endswith('.yml'):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8') as f:
                                  content = f.read()
                                  # جستجوی Shamela_xxxxxx
                                  ids = re.findall(r'Shamela_(\d+)', content)
                                  for sid in ids:
                                      shamela_ids.add(sid)
                                  
                                  # جستجوی shamela.ws URL
                                  urls = re.findall(r'https?://shamela\.ws/[^\s\n]+', content)
                                  for url in urls:
                                      print(f"   🔗 {url}")
                          except:
                              pass
              
              if shamela_ids:
                  print(f"   📚 شناسه‌های شامله: {shamela_ids}")
                  
                  # دانلود از شامله
                  for sid in list(shamela_ids)[:3]:  # حداکثر ۳ کتاب
                      try:
                          epub_url = f"https://shamela.ws/book/{sid}/epub"
                          print(f"   📥 دانلود: {epub_url}")
                          
                          response = requests.get(epub_url, headers={
                              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
                          }, timeout=60)
                          
                          if response.status_code == 200 and len(response.content) > 10000:
                              filename = f"{name}_{sid}.epub"
                              filepath = os.path.join(OUTPUT_DIR, filename)
                              with open(filepath, 'wb') as f:
                                  f.write(response.content)
                              print(f"   ✅ ذخیره شد: {filename} ({len(response.content):,} bytes)")
                          else:
                              print(f"   ❌ خطا: {response.status_code}")
                          
                          time.sleep(2)
                      except Exception as e:
                          print(f"   ❌ خطا: {e}")
              else:
                  print("   ❌ شناسه شامله یافت نشد")
          
          # فهرست نهایی
          print(f"\n{'='*60}")
          print("📊 فایل‌های دانلود شده:")
          for f in sorted(os.listdir(OUTPUT_DIR)):
              size = os.path.getsize(os.path.join(OUTPUT_DIR, f))
              print(f"   📄 {f} ({size:,} bytes)")
      
      - name: Upload Downloads
        uses: actions/upload-artifact@v4
        with:
          name: shamela-epub-downloads
          path: shamela_downloads/
          retention-days: 7
          compression-level: 6
